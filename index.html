<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Horas Extra - Parras Valley</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#080f14;color:#f0ede8;font-family:system-ui,sans-serif;font-size:16px;}
    select option{background:#080f14;}
    ::-webkit-scrollbar{width:18px;}
    ::-webkit-scrollbar-thumb{background:rgba(251,191,36,0.5);border-radius:9px;border:4px solid transparent;background-clip:padding-box;}
    @media print{.no-print{display:none!important;}body{background:#fff;color:#000;}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState;
var useEffect=React.useEffect;

function fmt(n){return "$"+n.toFixed(2);}
function fechaHoy(){return new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric"});}
function fbGet(url,cb){fetch(url).then(function(r){return r.json();}).then(cb).catch(function(){cb(null);});}
function fbSet(url,v){fetch(url,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}).catch(function(){});}

var FB="https://parrasvalley-default-rtdb.firebaseio.com";
var FB_PLANT=FB+"/extras-plantilla-v1.json";
var FB_REG=FB+"/extras-registros-v1.json";
var PRECIO_DEF=50;
var AREAS=["Persa","Slicer","Morron","Minibel","Europeo","Embolsado Persa","Embolsado Minibel","Embolsado Morron","Carton","Embarques","Trazabilidad","Calidad","Mantenimiento","Reciba","Descarga Fruta","Descarga Materiales"];

function App(){
  var s1=useState("menu"); var vista=s1[0]; var setVista=s1[1];
  var s2=useState(null); var area=s2[0]; var setArea=s2[1];
  var s3=useState({}); var plant=s3[0]; var setPlant=s3[1];
  var s4=useState({}); var regs=s4[0]; var setRegs=s4[1];
  var s5=useState(fechaHoy()); var fecha=s5[0]; var setFecha=s5[1];
  var s6=useState(PRECIO_DEF); var precio=s6[0]; var setPrecio=s6[1];
  var s7=useState(false); var edPrecio=s7[0]; var setEdPrecio=s7[1];
  var s8=useState(false); var carg=s8[0]; var setCarg=s8[1];
  var s9=useState(""); var nuevoNom=s9[0]; var setNuevoNom=s9[1];
  var s10=useState("foraneo"); var nuevoTipo=s10[0]; var setNuevoTipo=s10[1];
  var s11=useState(null); var filtro=s11[0]; var setFiltro=s11[1];
  var s12=useState(false); var showExtra=s12[0]; var setShowExtra=s12[1];
  var s13=useState(""); var extNom=s13[0]; var setExtNom=s13[1];
  var s14=useState(""); var extArea=s14[0]; var setExtArea=s14[1];
  var s15=useState(1); var extHrs=s15[0]; var setExtHrs=s15[1];
  var s16=useState("foraneo"); var extTipo=s16[0]; var setExtTipo=s16[1];
  var s17=useState(null); var moverM=s17[0]; var setMoverM=s17[1];
  var s18=useState(""); var moverDest=s18[0]; var setMoverDest=s18[1];
  var s19=useState("foraneos"); var moverTipo=s19[0]; var setMoverTipo=s19[1];

  useEffect(function(){
    setCarg(true);
    fbGet(FB_PLANT,function(d){
      if(d&&typeof d==="object")setPlant(d);
      fbGet(FB_REG,function(d2){
        if(d2&&typeof d2==="object")setRegs(d2);
        setCarg(false);
      });
    });
  },[]);

  function savPlant(v){setPlant(v);fbSet(FB_PLANT,v);}
  function savRegs(v){setRegs(v);fbSet(FB_REG,v);}

  function plantArea(a){var p=plant[a]||{foraneos:[],locales:[]};return{foraneos:p.foraneos||[],locales:p.locales||[]};}
  function trabArea(a){var p=plantArea(a);var r=[];p.foraneos.forEach(function(n){r.push({n:n,t:"foraneo"});});p.locales.forEach(function(n){r.push({n:n,t:"local"});});return r;}
  function regsArea(a){return regs[fecha+"|"+a]||[];}

  var INP={width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"11px",color:"#f0f0e8",fontFamily:"system-ui",fontSize:16,fontWeight:700,outline:"none"};
  var LBL={fontSize:11,color:"#9ca3af",fontWeight:800,textTransform:"uppercase",letterSpacing:1,marginBottom:5,display:"block"};
  var COL="#fbbf24";

  var totHoy=AREAS.reduce(function(s,a){return s+regsArea(a).reduce(function(ss,r){return ss+r.horas;},0);},0);

  if(vista==="menu"){
    return(
      <div style={{background:"#080f14",minHeight:"100vh"}}>
        <div style={{background:"rgba(0,0,0,0.85)",borderBottom:"2px solid rgba(251,191,36,0.25)",padding:"0 20px",display:"flex",alignItems:"center",height:62,position:"sticky",top:0,zIndex:50}} className="no-print">
          <div style={{fontSize:20,fontWeight:900,color:COL,flex:1}}>HORAS EXTRA</div>
          <button onClick={function(){setVista("resumen");}} style={{padding:"8px 16px",background:"rgba(251,191,36,0.15)",border:"2px solid rgba(251,191,36,0.3)",borderRadius:9,color:COL,fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"system-ui"}}>Ver resumen</button>
        </div>
        <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px 80px"}}>
          <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.09)",borderRadius:12,padding:"16px",marginBottom:20,display:"flex",flexWrap:"wrap",gap:14,alignItems:"center"}}>
            <div style={{flex:1,minWidth:180}}>
              <label style={LBL}>Fecha</label>
              <input style={INP} value={fecha} onChange={function(e){setFecha(e.target.value);}}/>
            </div>
            <div>
              <label style={LBL}>Precio/hora extra</label>
              {edPrecio
                ? <div style={{display:"flex",gap:8}}><input type="number" style={Object.assign({},INP,{maxWidth:120,color:COL})} value={precio} onChange={function(e){setPrecio(parseFloat(e.target.value)||0);}}/><button onClick={function(){setEdPrecio(false);}} style={{padding:"10px 14px",background:"rgba(251,191,36,0.15)",border:"2px solid rgba(251,191,36,0.4)",borderRadius:8,color:COL,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>OK</button></div>
                : <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22,fontWeight:900,color:COL,fontFamily:"Georgia,serif"}}>{fmt(precio)}/hr</span><button onClick={function(){setEdPrecio(true);}} style={{padding:"5px 10px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#9ca3af",fontSize:12,cursor:"pointer",fontFamily:"system-ui"}}>Editar</button></div>
              }
            </div>
          </div>
          {totHoy>0&&<div style={{background:"rgba(251,191,36,0.08)",border:"2px solid rgba(251,191,36,0.3)",borderRadius:12,padding:"14px 18px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:13,color:"#9ca3af"}}>Registrado hoy</div><div style={{fontSize:28,fontWeight:900,color:COL,fontFamily:"Georgia,serif"}}>{totHoy} hrs . {fmt(totHoy*precio)}</div></div>}
          <div style={{fontSize:11,fontWeight:900,color:"#4a6a7a",textTransform:"uppercase",letterSpacing:2,marginBottom:12}}>Selecciona area</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10,marginBottom:24}}>
            {AREAS.map(function(a){
              var r=regsArea(a);var h=r.reduce(function(s,x){return s+x.horas;},0);
              return(<button key={a} onClick={function(){setArea(a);setVista("captura");}} style={{padding:"14px 10px",background:h>0?"rgba(251,191,36,0.1)":"rgba(255,255,255,0.04)",border:"2px solid "+(h>0?"rgba(251,191,36,0.4)":"rgba(255,255,255,0.08)"),borderRadius:11,cursor:"pointer",fontFamily:"system-ui",textAlign:"left"}}><div style={{fontSize:15,fontWeight:900,color:h>0?COL:"#9ca3af"}}>{a}</div>{h>0&&<div style={{fontSize:12,color:"#6b7280",marginTop:3}}>{r.length} personas . {h} hrs</div>}{!h&&<div style={{fontSize:11,color:"#4a6a7a",marginTop:2}}>{trabArea(a).length} en plantilla</div>}</button>);
            })}
          </div>
          <button onClick={function(){setArea(AREAS[0]);setVista("plantilla");}} style={{width:"100%",padding:"13px",background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.1)",borderRadius:11,fontSize:15,fontWeight:800,color:"#6b7280",cursor:"pointer",fontFamily:"system-ui"}}>Editar plantilla de personal</button>
        </div>
      </div>
    );
  }

  if(vista==="captura"&&area){
    var trab=trabArea(area);
    var rA=regsArea(area);
    var k=fecha+"|"+area;

    function toggle(nom,tipo){
      var ya=rA.find(function(r){return r.nombre===nom&&!r.areaExtra;});
      var nr=Object.assign({},regs);
      if(ya){nr[k]=(nr[k]||[]).filter(function(r){return !(r.nombre===nom&&!r.areaExtra);});}
      else{nr[k]=(nr[k]||[]).concat([{id:Date.now()+"_"+nom,nombre:nom,tipo:tipo,horas:1,areaExtra:null}]);}
      if((nr[k]||[]).length===0)delete nr[k];
      savRegs(nr);
    }
    function setH(id,h){var nr=Object.assign({},regs);nr[k]=(nr[k]||[]).map(function(r){return r.id===id?Object.assign({},r,{horas:h}):r;});savRegs(nr);}
    function todos(){var nr=Object.assign({},regs);var extras=(nr[k]||[]).filter(function(r){return r.areaExtra;});nr[k]=extras.concat(trab.map(function(t){return{id:Date.now()+"_"+t.n,nombre:t.n,tipo:t.t,horas:1,areaExtra:null};}));savRegs(nr);}
    function ninguno(){var nr=Object.assign({},regs);nr[k]=(nr[k]||[]).filter(function(r){return r.areaExtra;});if((nr[k]||[]).length===0)delete nr[k];savRegs(nr);}
    function aplicarTodos(h){var nr=Object.assign({},regs);nr[k]=(nr[k]||[]).map(function(r){return r.areaExtra?r:Object.assign({},r,{horas:h});});savRegs(nr);}
    function agregarExtra(){
      if(!extNom||!extArea)return;
      var t2=trabArea(area).find(function(t){return t.n===extNom;});
      var k2=fecha+"|"+extArea;
      var nr=Object.assign({},regs);
      nr[k2]=(nr[k2]||[]).concat([{id:Date.now()+"_ext",nombre:extNom,tipo:t2?t2.t:extTipo,horas:extHrs,areaExtra:extArea,areaOrigen:area}]);
      savRegs(nr);setShowExtra(false);
    }
    function quitarExtra(id,areaCargo){var k3=fecha+"|"+areaCargo;var nr=Object.assign({},regs);nr[k3]=(nr[k3]||[]).filter(function(r){return r.id!==id;});if((nr[k3]||[]).length===0)delete nr[k3];savRegs(nr);}

    var base=rA.filter(function(r){return !r.areaExtra;});
    var extOtras=[];
    Object.keys(regs).forEach(function(ky){if(!ky.startsWith(fecha+"|"))return;var ac=ky.split("|")[1];if(ac===area)return;(regs[ky]||[]).forEach(function(r){if(r.areaOrigen===area&&r.areaExtra)extOtras.push(Object.assign({},r,{areaCargo:ac}));});});
    var totArea=rA.reduce(function(s,r){return s+r.horas;},0);
    var HRS=[0.5,1,1.5,2,2.5,3,3.5,4,5,6];

    return(
      <div style={{background:"#080f14",minHeight:"100vh"}}>
        <div style={{background:"rgba(0,0,0,0.85)",borderBottom:"2px solid rgba(251,191,36,0.25)",padding:"0 16px",display:"flex",alignItems:"center",height:62,position:"sticky",top:0,zIndex:50}} className="no-print">
          <button onClick={function(){setVista("menu");}} style={{marginRight:14,padding:"8px 14px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#9ca3af",fontSize:14,cursor:"pointer",fontFamily:"system-ui"}}>Volver</button>
          <div style={{fontSize:18,fontWeight:900,color:COL,flex:1}}>{area}</div>
          <div style={{fontSize:13,color:"#6b7280"}}>{fecha}</div>
        </div>
        <div style={{maxWidth:700,margin:"0 auto",padding:"18px 14px 80px"}}>

          <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.09)",borderRadius:12,padding:"14px",marginBottom:14}}>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
              <button onClick={todos} style={{padding:"9px 16px",background:"rgba(251,191,36,0.15)",border:"2px solid rgba(251,191,36,0.3)",borderRadius:9,color:COL,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"system-ui"}}>Seleccionar todos</button>
              <button onClick={ninguno} style={{padding:"9px 16px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#9ca3af",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Quitar todos</button>
            </div>
            {base.length>0&&(
              <div>
                <div style={{fontSize:11,color:"#6b7280",marginBottom:6}}>APLICAR MISMO HORARIO A TODOS</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {HRS.map(function(h){return(<button key={h} onClick={function(){aplicarTodos(h);}} style={{padding:"7px 12px",border:"2px solid rgba(255,255,255,0.1)",borderRadius:8,background:"rgba(255,255,255,0.05)",color:"#f0f0e8",fontWeight:700,cursor:"pointer",fontFamily:"system-ui",fontSize:14}}>{h}</button>);})}
                </div>
              </div>
            )}
          </div>

          <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.09)",borderRadius:12,padding:"14px",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:900,color:"#f0f0e8",marginBottom:12}}>Plantilla ({trab.length})</div>
            {trab.map(function(t){
              var reg=rA.find(function(r){return r.nombre===t.n&&!r.areaExtra;});
              return(
                <div key={t.n} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                  <button onClick={function(){toggle(t.n,t.t);}} style={{width:28,height:28,borderRadius:6,border:"2px solid "+(reg?"rgba(251,191,36,0.6)":"rgba(255,255,255,0.2)"),background:reg?"rgba(251,191,36,0.2)":"transparent",cursor:"pointer",flexShrink:0,color:reg?COL:"transparent",fontSize:16,fontWeight:900}}>
                    {reg?"v":""}
                  </button>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:reg?800:500,color:reg?"#f0f0e8":"#6b7280"}}>{t.n}</div>
                    <div style={{fontSize:11,color:t.t==="local"?"#4ade80":"#60a5fa"}}>{t.t}</div>
                  </div>
                  {reg&&(
                    <div style={{display:"flex",gap:3,flexWrap:"wrap",justifyContent:"flex-end"}}>
                      {HRS.map(function(h){return(<button key={h} onClick={function(){setH(reg.id,h);}} style={{padding:"5px 8px",border:"1px solid "+(reg.horas===h?"rgba(251,191,36,0.6)":"rgba(255,255,255,0.1)"),borderRadius:6,background:reg.horas===h?"rgba(251,191,36,0.2)":"transparent",color:reg.horas===h?COL:"#6b7280",fontWeight:700,cursor:"pointer",fontFamily:"system-ui",fontSize:12}}>{h}</button>);})}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          <div style={{background:"rgba(96,165,250,0.06)",border:"2px solid rgba(96,165,250,0.25)",borderRadius:12,padding:"14px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:13,fontWeight:900,color:"#60a5fa"}}>Horas cargadas a otra area</div>
              <button onClick={function(){setShowExtra(true);setExtNom("");setExtArea("");setExtHrs(1);}} style={{padding:"7px 14px",background:"rgba(96,165,250,0.15)",border:"2px solid rgba(96,165,250,0.3)",borderRadius:8,color:"#60a5fa",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"system-ui"}}>+ Agregar</button>
            </div>
            {extOtras.length===0
              ? <div style={{fontSize:13,color:"#4a6a7a",textAlign:"center",padding:"8px 0"}}>Sin horas en otras areas</div>
              : extOtras.map(function(r){return(
                <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                  <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:"#f0f0e8"}}>{r.nombre}</div><div style={{fontSize:11,color:"#60a5fa"}}>Cargo: {r.areaCargo}</div></div>
                  <div style={{fontSize:20,fontWeight:900,color:"#60a5fa",fontFamily:"Georgia,serif"}}>{r.horas}hrs</div>
                  <button onClick={function(){quitarExtra(r.id,r.areaCargo);}} style={{padding:"5px 10px",background:"transparent",border:"1px solid rgba(248,113,113,0.3)",borderRadius:6,color:"#f87171",fontSize:12,cursor:"pointer",fontFamily:"system-ui"}}>X</button>
                </div>
              );})}
          </div>

          {totArea>0&&<div style={{background:"rgba(251,191,36,0.1)",border:"2px solid rgba(251,191,36,0.4)",borderRadius:12,padding:"14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:15,fontWeight:800,color:COL}}>Total {area}</div><div style={{textAlign:"right"}}><div style={{fontSize:26,fontWeight:900,color:COL,fontFamily:"Georgia,serif"}}>{totArea} hrs</div><div style={{fontSize:14,color:"#9ca3af"}}>{fmt(totArea*precio)}</div></div></div>}

          {showExtra&&(
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.9)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
              <div style={{background:"#080f14",border:"2px solid rgba(96,165,250,0.4)",borderRadius:14,padding:"24px",maxWidth:400,width:"100%"}}>
                <div style={{fontSize:16,fontWeight:900,color:"#60a5fa",marginBottom:18}}>Horas en otra area</div>
                <div style={{marginBottom:12}}>
                  <label style={LBL}>Trabajador</label>
                  <select style={INP} value={extNom} onChange={function(e){setExtNom(e.target.value);}}>
                    <option value="">-- Seleccionar --</option>
                    {trab.map(function(t){return <option key={t.n} value={t.n}>{t.n}</option>;})}
                  </select>
                </div>
                <div style={{marginBottom:12}}>
                  <label style={LBL}>Area donde se cargan</label>
                  <select style={INP} value={extArea} onChange={function(e){setExtArea(e.target.value);}}>
                    <option value="">-- Seleccionar --</option>
                    {AREAS.filter(function(a){return a!==area;}).map(function(a){return <option key={a} value={a}>{a}</option>;})}
                  </select>
                </div>
                <div style={{marginBottom:18}}>
                  <label style={LBL}>Horas</label>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {HRS.map(function(h){return(<button key={h} onClick={function(){setExtHrs(h);}} style={{padding:"8px 12px",border:"2px solid "+(extHrs===h?"rgba(96,165,250,0.6)":"rgba(255,255,255,0.1)"),borderRadius:8,background:extHrs===h?"rgba(96,165,250,0.2)":"transparent",color:extHrs===h?"#60a5fa":"#6b7280",fontWeight:700,cursor:"pointer",fontFamily:"system-ui",fontSize:14}}>{h}</button>);})}
                  </div>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={function(){setShowExtra(false);}} style={{flex:1,padding:"12px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#6b7280",fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Cancelar</button>
                  <button onClick={agregarExtra} style={{flex:2,padding:"12px",background:"rgba(96,165,250,0.15)",border:"2px solid rgba(96,165,250,0.3)",borderRadius:9,color:"#60a5fa",fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Guardar</button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  if(vista==="plantilla"){
    var aE=area||AREAS[0];
    var pA=plant[aE]||{foraneos:[],locales:[]};
    function borrarDe(nom,tipo){var p=JSON.parse(JSON.stringify(plant));(p[aE]=p[aE]||{});p[aE][tipo]=(p[aE][tipo]||[]).filter(function(n){return n!==nom;});savPlant(p);}
    function moverA(nom,tipo){
      if(!moverDest)return;
      var p=JSON.parse(JSON.stringify(plant));
      p[aE][tipo]=(p[aE][tipo]||[]).filter(function(n){return n!==nom;});
      p[moverDest]=p[moverDest]||{foraneos:[],locales:[]};
      if((p[moverDest][moverTipo]||[]).indexOf(nom)<0)p[moverDest][moverTipo]=(p[moverDest][moverTipo]||[]).concat([nom]);
      savPlant(p);setMoverM(null);
    }
    function agregar(){
      if(!nuevoNom.trim())return;
      var p=JSON.parse(JSON.stringify(plant));
      p[aE]=p[aE]||{foraneos:[],locales:[]};
      var lista=nuevoTipo==="local"?"locales":"foraneos";
      if((p[aE][lista]||[]).indexOf(nuevoNom.trim())<0)p[aE][lista]=(p[aE][lista]||[]).concat([nuevoNom.trim()]);
      savPlant(p);setNuevoNom("");
    }
    return(
      <div style={{background:"#080f14",minHeight:"100vh"}}>
        <div style={{background:"rgba(0,0,0,0.85)",borderBottom:"2px solid rgba(251,191,36,0.25)",padding:"0 16px",display:"flex",alignItems:"center",height:62,position:"sticky",top:0,zIndex:50}}>
          <button onClick={function(){setVista("menu");}} style={{marginRight:14,padding:"8px 14px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#9ca3af",fontSize:14,cursor:"pointer",fontFamily:"system-ui"}}>Volver</button>
          <div style={{fontSize:18,fontWeight:900,color:COL,flex:1}}>Plantilla</div>
        </div>
        <div style={{maxWidth:700,margin:"0 auto",padding:"18px 14px 80px"}}>
          <div style={{marginBottom:14}}>
            <label style={LBL}>Area</label>
            <select style={INP} value={aE} onChange={function(e){setArea(e.target.value);}}>
              {AREAS.map(function(a){return <option key={a} value={a}>{a}</option>;})}
            </select>
          </div>
          <div style={{background:"rgba(251,191,36,0.06)",border:"2px solid rgba(251,191,36,0.2)",borderRadius:12,padding:"14px",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:900,color:COL,marginBottom:10}}>Agregar persona a {aE}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
              <input style={Object.assign({},INP,{flex:1,minWidth:180})} placeholder="Nombre completo" value={nuevoNom} onChange={function(e){setNuevoNom(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")agregar();}}/>
              <select style={Object.assign({},INP,{maxWidth:130})} value={nuevoTipo} onChange={function(e){setNuevoTipo(e.target.value);}}>
                <option value="foraneo">Foraneo</option>
                <option value="local">Local</option>
              </select>
            </div>
            <button onClick={agregar} style={{padding:"10px 20px",background:"rgba(251,191,36,0.15)",border:"2px solid rgba(251,191,36,0.3)",borderRadius:9,color:COL,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Agregar</button>
          </div>
          {["locales","foraneos"].map(function(tipo){
            var lista=pA[tipo]||[];var label=tipo==="locales"?"Locales":"Foraneos";var col=tipo==="locales"?"#4ade80":"#60a5fa";
            if(!lista.length)return null;
            return(
              <div key={tipo} style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"14px",marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:900,color:col,marginBottom:10}}>{label} ({lista.length})</div>
                {lista.map(function(nom){return(
                  <div key={nom} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                    <div style={{flex:1,fontSize:15,fontWeight:700,color:"#f0f0e8"}}>{nom}</div>
                    <button onClick={function(){setMoverM({nom:nom,tipo:tipo});setMoverDest("");setMoverTipo("foraneos");}} style={{padding:"5px 10px",background:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:6,color:COL,fontSize:12,cursor:"pointer",fontFamily:"system-ui"}}>Mover</button>
                    <button onClick={function(){borrarDe(nom,tipo);}} style={{padding:"5px 10px",background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.3)",borderRadius:6,color:"#f87171",fontSize:12,cursor:"pointer",fontFamily:"system-ui"}}>Borrar</button>
                  </div>
                );})}
              </div>
            );
          })}
        </div>
        {moverM&&(
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.9)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
            <div style={{background:"#080f14",border:"2px solid rgba(251,191,36,0.4)",borderRadius:14,padding:"24px",maxWidth:360,width:"100%"}}>
              <div style={{fontSize:15,fontWeight:900,color:COL,marginBottom:5}}>Mover persona</div>
              <div style={{fontSize:13,color:"#9ca3af",marginBottom:18}}>{moverM.nom}</div>
              <div style={{marginBottom:12}}><label style={LBL}>Area destino</label><select style={INP} value={moverDest} onChange={function(e){setMoverDest(e.target.value);}}><option value="">-- Seleccionar --</option>{AREAS.filter(function(a){return a!==aE;}).map(function(a){return <option key={a} value={a}>{a}</option>;})}</select></div>
              <div style={{marginBottom:18}}><label style={LBL}>Tipo</label><select style={INP} value={moverTipo} onChange={function(e){setMoverTipo(e.target.value);}}><option value="foraneos">Foraneo</option><option value="locales">Local</option></select></div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={function(){setMoverM(null);}} style={{flex:1,padding:"11px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#6b7280",fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Cancelar</button>
                <button onClick={function(){moverA(moverM.nom,moverM.tipo);}} style={{flex:2,padding:"11px",background:"rgba(251,191,36,0.15)",border:"2px solid rgba(251,191,36,0.3)",borderRadius:9,color:COL,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Mover</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  if(vista==="resumen"){
    var areasReg=AREAS.filter(function(a){return regsArea(a).length>0;});
    var filtradas=filtro?areasReg.filter(function(a){return a===filtro;}):areasReg;
    var totG=filtradas.reduce(function(s,a){return s+regsArea(a).reduce(function(ss,r){return ss+r.horas;},0);},0);
    return(
      <div style={{background:"#080f14",minHeight:"100vh"}}>
        <div style={{background:"rgba(0,0,0,0.85)",borderBottom:"2px solid rgba(251,191,36,0.25)",padding:"0 16px",display:"flex",alignItems:"center",height:62,position:"sticky",top:0,zIndex:50}} className="no-print">
          <button onClick={function(){setVista("menu");}} style={{marginRight:14,padding:"8px 14px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#9ca3af",fontSize:14,cursor:"pointer",fontFamily:"system-ui"}}>Volver</button>
          <div style={{fontSize:18,fontWeight:900,color:COL,flex:1}}>Resumen - {fecha}</div>
          <button onClick={function(){window.print();}} style={{padding:"9px 18px",background:"linear-gradient(135deg,#78350f,#fbbf24)",border:"none",borderRadius:9,color:"#000",fontSize:14,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Imprimir</button>
        </div>
        <div style={{maxWidth:900,margin:"0 auto",padding:"18px 14px 80px"}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}} className="no-print">
            <button onClick={function(){setFiltro(null);}} style={{padding:"7px 14px",border:"2px solid "+(filtro===null?"rgba(251,191,36,0.6)":"rgba(255,255,255,0.1)"),borderRadius:18,background:filtro===null?"rgba(251,191,36,0.15)":"transparent",color:filtro===null?"#fbbf24":"#6b7280",fontFamily:"system-ui",fontSize:12,fontWeight:700,cursor:"pointer"}}>Todas</button>
            {areasReg.map(function(a){return(<button key={a} onClick={function(){setFiltro(a);}} style={{padding:"7px 14px",border:"2px solid "+(filtro===a?"rgba(251,191,36,0.6)":"rgba(255,255,255,0.1)"),borderRadius:18,background:filtro===a?"rgba(251,191,36,0.15)":"transparent",color:filtro===a?"#fbbf24":"#6b7280",fontFamily:"system-ui",fontSize:12,fontWeight:700,cursor:"pointer"}}>{a}</button>);})}
          </div>
          <div style={{marginBottom:16,paddingBottom:14,borderBottom:"2px solid rgba(255,255,255,0.08)"}}>
            <div style={{fontSize:20,fontWeight:900,color:"#fbbf24"}}>PARRAS VALLEY - HORAS EXTRA</div>
            <div style={{fontSize:14,color:"#9ca3af",marginTop:4}}>Fecha: {fecha} . Precio/hora: {fmt(precio)} . Total: {totG} hrs . {fmt(totG*precio)}</div>
          </div>
          {!filtradas.length
            ? <div style={{textAlign:"center",padding:60,color:"#4a6a7a"}}>Sin registros</div>
            : filtradas.map(function(a){
              var r=regsArea(a);var h=r.reduce(function(s,x){return s+x.horas;},0);
              var loc=r.filter(function(x){return x.tipo==="local";});
              var for2=r.filter(function(x){return x.tipo==="foraneo";});
              return(
                <div key={a} style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(251,191,36,0.2)",borderRadius:12,marginBottom:14,overflow:"hidden"}}>
                  <div style={{background:"rgba(251,191,36,0.1)",borderBottom:"2px solid rgba(251,191,36,0.2)",padding:"11px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontSize:19,fontWeight:900,color:"#fbbf24"}}>{a}</div>
                    <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#9ca3af"}}>{r.length} personas</div><div style={{fontSize:20,fontWeight:900,color:"#fbbf24",fontFamily:"Georgia,serif"}}>{h} hrs . {fmt(h*precio)}</div></div>
                  </div>
                  <div style={{padding:"12px 18px"}}>
                    {[{label:"Locales",lista:loc,col:"#4ade80"},{label:"Foraneos",lista:for2,col:"#60a5fa"}].map(function(g){
                      if(!g.lista.length)return null;
                      return(
                        <div key={g.label} style={{marginBottom:10}}>
                          <div style={{fontSize:11,fontWeight:800,color:g.col,marginBottom:6,textTransform:"uppercase"}}>{g.label} ({g.lista.length})</div>
                          <table style={{width:"100%",borderCollapse:"collapse"}}>
                            <tbody>
                              {g.lista.map(function(rx){return(
                                <tr key={rx.id} style={{borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                                  <td style={{padding:"7px 4px",fontSize:14,fontWeight:700,color:"#f0f0e8"}}>{rx.nombre}</td>
                                  {rx.areaExtra&&<td style={{padding:"7px 4px",fontSize:11,color:"#60a5fa"}}>cargo: {rx.areaExtra}</td>}
                                  <td style={{padding:"7px 4px",textAlign:"right",fontSize:16,fontWeight:900,color:g.col,fontFamily:"Georgia,serif"}}>{rx.horas}hrs</td>
                                  <td style={{padding:"7px 4px",textAlign:"right",fontSize:14,color:"#9ca3af"}}>{fmt(rx.horas*precio)}</td>
                                </tr>
                              );})}
                            </tbody>
                          </table>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })
          }
          {filtradas.length>0&&<div style={{background:"rgba(251,191,36,0.1)",border:"2px solid rgba(251,191,36,0.4)",borderRadius:12,padding:"16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:17,fontWeight:900,color:"#fbbf24"}}>TOTAL GENERAL</div><div style={{textAlign:"right"}}><div style={{fontSize:13,color:"#9ca3af"}}>{filtradas.reduce(function(s,a){return s+regsArea(a).length;},0)} personas . {totG} horas</div><div style={{fontSize:30,fontWeight:900,color:"#fbbf24",fontFamily:"Georgia,serif"}}>{fmt(totG*precio)}</div></div></div>}
        </div>
      </div>
    );
  }

  return <div style={{color:"#fbbf24",padding:40,textAlign:"center",fontSize:18}}>{carg?"Cargando...":"Cargando app..."}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
