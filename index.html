<!DOCTYPE html>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#080f14;color:#f0ede8;font-family:system-ui,sans-serif;font-size:16px;}
    select option{background:#080f14;}
    ::-webkit-scrollbar{width:18px;}
    ::-webkit-scrollbar-thumb{background:rgba(251,191,36,0.5);border-radius:9px;border:4px solid transparent;background-clip:padding-box;}
    @media print{
      .no-print{display:none!important;}
      body{background:#fff;color:#000;font-size:13px;}
      .pcard{background:#fff!important;color:#000!important;border:1px solid #ccc!important;page-break-inside:avoid;break-inside:avoid;}
      .pcard-area{page-break-before:always;break-before:always;}
      .pcard-area:first-child{page-break-before:auto;break-before:auto;}
      .print-header{display:block!important;}
      table{width:100%;border-collapse:collapse;}
      td,th{border:1px solid #ccc;padding:5px 8px;font-size:12px;}
      .area-title{font-size:16px;font-weight:900;border-bottom:2px solid #000;padding-bottom:6px;margin-bottom:10px;}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState;
var useEffect=React.useEffect;

var FB="https://parrasvalley-default-rtdb.firebaseio.com";
var FB_PLANT=FB+"/extras-plantilla-v1.json";
var FB_REG=FB+"/extras-registros-v1.json";

  "Morron":{"foraneos":["Jose Eliver Moreno Jimenez","Omar Gomez Moreno","Angelica Calixto Perez","Angelica Guzman Martinez","Wilber Rodriguez Hernandez","Mateo Hernandez Rodriguez","Pedro Jeremias Rodriguez Moreno","Nicodemo Lopez Encino","Juan Carlos Jimenez Gomez","Angel Gabriel Moreno Jimenez","Efrain Moreno Moreno","Sergio Neptali Aguilar Santiz","Marcos Moreno Jimenez","Jose Ramon Aguilar Hernandez","Floriberto Aguilar Jimenez","Jose Emiliano Santiz Jimenez","Hector Gomez Moreno","Erlin Gamaliel Hernandez Gomez","Maria Soledad Aguilar Perez","Adolfo Angel Aguilar Hernandez","Imelda Lopez Hernandez","Carlos Lopez Perez","Daniel Arturo Vazquez Hernandez","Felipe de Jesus Lopez Hernandez","Alexis Aguilar"],"locales":["Maria Teresa Vazquez Martinez","Juana Vazquez Martinez","Francisca Martinez Marin","Paulina Garcia Garcia","Gladys Zulema Berrelleza Garcia","Isidra Martinez Rodriguez"]},
  "Calidad":{"foraneos":["Ami Dayana Jimenez Feliciano","Jose Guadalupe Perez Fernandez","Edgar Hernandez Espinoza","Jose Angel Morales Hernandez","Juan Diego Hernandez Morales"],"locales":["Silvestre Lopez Perez"]},
  "Trazabilidad":{"foraneos":["Hector Bautista Hernandez","Griselda Mireya Guzman Sanchez","Eliver Hernandez Alvarez","Jacqueline Aguilar Guzman"],"locales":["Cristo Fernando Matamoros Rodriguez","Miguel Neftali Hernandez Eliserio"]},
  "Carton":{"foraneos":["Rafael Sanchez Aguilar","Carlos Aguilar Guzman","Rocalin Sanchez Guzman","Daniel de Jesus Aguilar Hernandez","Juan Manuel Santiz Gomez"],"locales":["Agustin Alberto Sepulveda Martinez"]},
  "Descargas":{"foraneos":["Manuel Feliciano de la Loma"],"locales":["Edgar Alonso Gutierrez"]},
  "Embarques":{"foraneos":[],"locales":["Bernabe Flores Salazar"]},
  "Mantenimiento":{"foraneos":[],"locales":["Julio Lopez Ramos","Eduardo Alejandro Alpuche","Tomas Fabian Mendez Hernandez"]},
  "Auxiliares":{"foraneos":[],"locales":["Carol Azuri Sul Rendon","Getsemani Gonzalez Carreon"]},
  "Slicer":{"foraneos":[],"locales":[]},
  "Minibel":{"foraneos":[],"locales":[]},

};


var ICONOS={
  "Persa":"[P]","Slicer":"[S]","Morron":"[M]","Minibel":"[m]","Europeo":"[E]",
  "Embolsado Persa":"[EP]","Embolsado Minibel":"[Em]","Embolsado Morron":"[EM]",
  "Carton":"[C]","Embarques":"[Trk]","Trazabilidad":"[Tz]","Calidad":"[OK]",
  "Mantenimiento":"[Mnt]","Descargas":"[D]","Auxiliares":"[Aux]"
};
var COLORES_AREA={
  "Persa":"#4ade80","Slicer":"#38bdf8","Morron":"#f43f5e","Minibel":"#fb923c",
  "Europeo":"#86efac","Embolsado Persa":"#4ade80","Embolsado Minibel":"#fb923c",
  "Embolsado Morron":"#f43f5e","Carton":"#94a3b8","Embarques":"#fbbf24",
  "Trazabilidad":"#60a5fa","Calidad":"#a78bfa","Mantenimiento":"#f97316",
  "Descargas":"#fb923c","Auxiliares":"#e879f9"
};
function iconoArea(a){return ICONOS[a]||"[?]";}
function colorArea(a){return COLORES_AREA[a]||"#fbbf24";}
function fmt(n){return "$"+n.toFixed(2);}
function fechaHoy(){return new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric"});}
function fbGet(url,cb){fetch(url).then(function(r){return r.json();}).then(cb).catch(function(){cb(null);});}
function fbSet(url,v){fetch(url,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}).catch(function(){});}

function ModalPin(props){
  var s1=useState(""); var v=s1[0]; var sv=s1[1];
  var s2=useState(false); var err=s2[0]; var sErr=s2[1];
  function ok(){
    if(v===PIN_MAESTRO){sv("");sErr(false);props.onOk(true);return;}
    if(props.area&&PINS[props.area]&&v===PINS[props.area]){sv("");sErr(false);props.onOk(false);return;}
    sErr(true);sv("");
  }
  return(
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#080f14",border:"2px solid rgba(251,191,36,0.4)",borderRadius:14,padding:28,maxWidth:300,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:17,fontWeight:900,color:"#fbbf24",marginBottom:4}}>{props.area||"Acceso"}</div>
        <div style={{fontSize:13,color:"#6b7280",marginBottom:18}}>Ingresa tu PIN</div>
        <input type="password" value={v} onChange={function(e){sv(e.target.value);sErr(false);}} placeholder="PIN"
          style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid "+(err?"#f87171":"rgba(251,191,36,0.4)"),borderRadius:9,padding:"12px",color:"#fbbf24",fontFamily:"Georgia,serif",fontSize:24,textAlign:"center",outline:"none",marginBottom:err?8:16,letterSpacing:6}}/>
        {err&&<div style={{fontSize:12,color:"#f87171",marginBottom:10}}>PIN incorrecto</div>}
        <div style={{display:"flex",gap:10}}>
          <button onClick={props.onCancel} style={{flex:1,padding:"11px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#6b7280",fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Cancelar</button>
          <button onClick={ok} style={{flex:1,padding:"11px",background:"rgba(251,191,36,0.15)",border:"2px solid rgba(251,191,36,0.4)",borderRadius:9,color:"#fbbf24",fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Entrar</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  var s1=useState("login"); var vista=s1[0]; var setVista=s1[1];
  var s2=useState(null); var areaAuth=s2[0]; var setAreaAuth=s2[1];
  var s3=useState(false); var esMaestro=s3[0]; var setEsMaestro=s3[1];
  var s4=useState(PLANTILLA_BASE); var plant=s4[0]; var setPlant=s4[1];
  var s5=useState({}); var regs=s5[0]; var setRegs=s5[1];
  var s6=useState([]); var hist=s6[0]; var setHist=s6[1];
  var s7=useState(fechaHoy()); var fecha=s7[0]; var setFecha=s7[1];
  var s8=useState(PRECIO_DEF); var precio=s8[0]; var setPrecio=s8[1];
  var s9=useState(false); var edPrecio=s9[0]; var setEdPrecio=s9[1];
  var s10=useState(false); var showPin=s10[0]; var setShowPin=s10[1];
  var s11=useState(null); var pinCb=s11[0]; var setPinCb=s11[1];
  var s12=useState(""); var nuevoNom=s12[0]; var setNuevoNom=s12[1];
  var s13=useState("foraneo"); var nuevoTipo=s13[0]; var setNuevoTipo=s13[1];
  var s14=useState(false); var showExtra=s14[0]; var setShowExtra=s14[1];
  var s15=useState([]); var extSel=s15[0]; var setExtSel=s15[1];
  var s16=useState(""); var extArea=s16[0]; var setExtArea=s16[1];
  var s17=useState(0); var extHrs=s17[0]; var setExtHrs=s17[1];
  var s28=useState(""); var extDe=s28[0]; var setExtDe=s28[1];
  var s29=useState(""); var extA=s29[0]; var setExtA=s29[1];
  var s30=useState({}); var extHrsInd=s30[0]; var setExtHrsInd=s30[1];
  var s18=useState(null); var moverM=s18[0]; var setMoverM=s18[1];
  var s19=useState(""); var moverDest=s19[0]; var setMoverDest=s19[1];
  var s20=useState("foraneos"); var moverTipo=s20[0]; var setMoverTipo=s20[1];
  var s21=useState(null); var filtroHist=s21[0]; var setFiltroHist=s21[1];
  var s22=useState("todos"); var filtroTipo=s22[0]; var setFiltroTipo=s22[1];
  var s23=useState(null); var histEdit=s23[0]; var setHistEdit=s23[1];
  var s24=useState(false); var carg=s24[0]; var setCarg=s24[1];
  var s25=useState(null); var precioEsp=s25[0]; var setPrecioEsp=s25[1];
  var s26=useState(""); var horaDe=s26[0]; var setHoraDe=s26[1];
  var s27=useState(""); var horaA=s27[0]; var setHoraA=s27[1];

  useEffect(function(){
    setCarg(true);
    fbGet(FB_PLANT,function(d){
      if(d&&typeof d==="object"&&Object.keys(d).length>0){setPlant(d);}
      else{setPlant(PLANTILLA_BASE);fbSet(FB_PLANT,PLANTILLA_BASE);}
      fbGet(FB_REG,function(d2){
        if(d2&&typeof d2==="object")setRegs(d2);
        fbGet(FB_HIST,function(d3){
          if(d3&&Array.isArray(d3))setHist(d3);
          setCarg(false);
        });
      });
    });
  },[]);

  function savPlant(v){setPlant(v);fbSet(FB_PLANT,v);}
  function savRegs(v){setRegs(v);fbSet(FB_REG,v);}
  function savHist(v){setHist(v);fbSet(FB_HIST,v);}

  function plantArea(a){var p=plant[a]||{foraneos:[],locales:[]};return{foraneos:p.foraneos||[],locales:p.locales||[]};}
  function trabArea(a){var p=plantArea(a);var r=[];p.foraneos.forEach(function(n){r.push({n:n,t:"foraneo"});});p.locales.forEach(function(n){r.push({n:n,t:"local"});});return r;}
  function regsArea(a){return regs[fecha+"|"+a]||[];}

  function pinReq(cb){setPinCb(function(){return cb;});setShowPin(true);}
  function pinOk(maestro){setShowPin(false);if(pinCb){pinCb(maestro);setPinCb(null);}}

  var COL="#fbbf24";
  var HRS=[0.5,1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8,9,10];
  var INP={width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"11px",color:"#f0ede8",fontFamily:"system-ui",fontSize:16,fontWeight:700,outline:"none"};
  var LBL={fontSize:11,color:"#9ca3af",fontWeight:800,textTransform:"uppercase",letterSpacing:1,marginBottom:5,display:"block"};

  var areaActual=areaAuth;
  var areasVisibles=esMaestro?AREAS:(areaActual?[areaActual]:[]);

  // LOGIN
  if(vista==="login"){
    return(
      <div style={{background:"#080f14",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{maxWidth:460,width:"100%"}}>
          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{fontSize:11,color:"#4a6a7a",fontWeight:800,letterSpacing:3,marginBottom:6}}>PARRAS VALLEY</div>
            <div style={{fontSize:28,fontWeight:900,color:COL,letterSpacing:2}}>HORAS EXTRA</div>
          </div>
          <div style={{fontSize:12,fontWeight:800,color:"#4a6a7a",textTransform:"uppercase",letterSpacing:2,marginBottom:12}}>Selecciona tu area</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8,marginBottom:16}}>
            {AREAS.map(function(a){
              return(
                <button key={a} onClick={function(){pinReq(function(maestro){setAreaAuth(a);setEsMaestro(maestro);setVista("captura");});}}
                  style={{padding:"14px 10px",background:"rgba(255,255,255,0.04)",border:"2px solid "+colorArea(a)+"55",borderRadius:11,cursor:"pointer",fontFamily:"system-ui",textAlign:"center",transition:"all 0.15s"}}>
                  <div style={{width:44,height:44,borderRadius:"50%",background:colorArea(a),margin:"0 auto 8px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:900,color:"#000",boxShadow:"0 4px 12px "+colorArea(a)+"55"}}>{iconoArea(a)}</div>
                  <div style={{fontSize:13,fontWeight:900,color:colorArea(a),lineHeight:1.2}}>{a}</div>
                </button>
              );
            })}
          </div>
          <button onClick={function(){pinReq(function(maestro){if(maestro){setAreaAuth(null);setEsMaestro(true);setVista("menu");}});}}
            style={{width:"100%",padding:"14px",background:"rgba(251,191,36,0.1)",border:"2px solid rgba(251,191,36,0.3)",borderRadius:11,fontSize:16,fontWeight:900,color:COL,cursor:"pointer",fontFamily:"system-ui"}}>
            Acceso maestro
          </button>
        </div>
        {showPin&&<ModalPin area={null} onOk={pinOk} onCancel={function(){setShowPin(false);setPinCb(null);}}/>}
      </div>
    );
  }

  // MENU MAESTRO
  if(vista==="menu"&&esMaestro){
    var totHoy=AREAS.reduce(function(s,a){return s+regsArea(a).reduce(function(ss,r){return ss+r.horas;},0);},0);
    return(
      <div style={{background:"#080f14",minHeight:"100vh"}}>
        <div style={{background:"rgba(0,0,0,0.85)",borderBottom:"2px solid rgba(251,191,36,0.25)",padding:"0 20px",display:"flex",alignItems:"center",height:62,position:"sticky",top:0,zIndex:50}} className="no-print">
          <div style={{fontSize:20,fontWeight:900,color:COL,flex:1}}>HORAS EXTRA</div>
          <button onClick={function(){setVista("resumen");}} style={{marginRight:8,padding:"8px 14px",background:"rgba(251,191,36,0.15)",border:"2px solid rgba(251,191,36,0.3)",borderRadius:9,color:COL,fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"system-ui"}}>Resumen</button>
          <button onClick={function(){setVista("historial");}} style={{marginRight:8,padding:"8px 14px",background:"rgba(96,165,250,0.1)",border:"2px solid rgba(96,165,250,0.3)",borderRadius:9,color:"#60a5fa",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"system-ui"}}>Historial</button>
          <button onClick={function(){setVista("acumulado");}} style={{marginRight:8,padding:"8px 14px",background:"rgba(74,222,128,0.1)",border:"2px solid rgba(74,222,128,0.3)",borderRadius:9,color:"#4ade80",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"system-ui"}}>Acumulado</button>
          <button onClick={function(){setVista("login");setEsMaestro(false);setAreaAuth(null);}} style={{padding:"8px 14px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#6b7280",fontSize:13,cursor:"pointer",fontFamily:"system-ui"}}>Salir</button>
        </div>
        <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px 80px"}}>
          <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.09)",borderRadius:12,padding:"16px",marginBottom:20,display:"flex",flexWrap:"wrap",gap:14,alignItems:"center"}}>
            <div style={{flex:1,minWidth:180}}>
              <label style={LBL}>Fecha</label>
              <input style={INP} value={fecha} onChange={function(e){setFecha(e.target.value);}}/>
            </div>
            <div>
              <label style={LBL}>Precio/hora extra</label>
              {edPrecio
                ?<div style={{display:"flex",gap:8}}><input type="number" style={Object.assign({},INP,{maxWidth:120,color:COL})} value={precio} onChange={function(e){setPrecio(parseFloat(e.target.value)||0);}}/><button onClick={function(){setEdPrecio(false);}} style={{padding:"10px 14px",background:"rgba(251,191,36,0.15)",border:"2px solid rgba(251,191,36,0.4)",borderRadius:8,color:COL,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>OK</button></div>
                :<div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22,fontWeight:900,color:COL,fontFamily:"Georgia,serif"}}>{fmt(precio)}/hr</span><button onClick={function(){setEdPrecio(true);}} style={{padding:"5px 10px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#9ca3af",fontSize:12,cursor:"pointer",fontFamily:"system-ui"}}>Editar</button></div>
              }
            </div>
          </div>
          {totHoy>0&&<div style={{background:"rgba(251,191,36,0.08)",border:"2px solid rgba(251,191,36,0.3)",borderRadius:12,padding:"14px 18px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:13,color:"#9ca3af"}}>Registrado hoy</div><div style={{fontSize:28,fontWeight:900,color:COL,fontFamily:"Georgia,serif"}}>{totHoy} hrs . {fmt(totHoy*precio)}</div></div>}
          <div style={{fontSize:11,fontWeight:900,color:"#4a6a7a",textTransform:"uppercase",letterSpacing:2,marginBottom:12}}>Areas</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10,marginBottom:20}}>
            {AREAS.map(function(a){var r=regsArea(a);var h=r.reduce(function(s,x){return s+x.horas;},0);
              return(<button key={a} onClick={function(){setAreaAuth(a);setVista("captura");}} style={{padding:"12px 10px",background:h>0?colorArea(a)+"18":"rgba(255,255,255,0.04)",border:"2px solid "+(h>0?colorArea(a)+"55":"rgba(255,255,255,0.08)"),borderRadius:11,cursor:"pointer",fontFamily:"system-ui",textAlign:"left"}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:h>0?4:0}}><div style={{width:28,height:28,borderRadius:"50%",background:colorArea(a),display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:"#000",flexShrink:0}}>{iconoArea(a)}</div><div style={{fontSize:14,fontWeight:900,color:h>0?colorArea(a):"#9ca3af"}}>{a}</div></div>{h>0&&<div style={{fontSize:12,color:"#6b7280",paddingLeft:36}}>{r.length} personas . {h} hrs</div>}{!h&&<div style={{fontSize:11,color:"#4a6a7a",paddingLeft:36}}>{trabArea(a).length} en plantilla</div>}</button>);
            })}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={function(){setVista("plantilla");}} style={{flex:1,padding:"13px",background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.1)",borderRadius:11,fontSize:14,fontWeight:800,color:"#6b7280",cursor:"pointer",fontFamily:"system-ui"}}>Editar plantilla</button>
            <button onClick={function(){
              if(!Object.keys(regs).some(function(k){return k.startsWith(fecha+"|");}))return;
              var entrada={id:Date.now(),fecha:fecha,precio:precio,areas:{}};
              AREAS.forEach(function(a){var r=regsArea(a);if(r.length>0)entrada.areas[a]=r.slice();});
              var nuevoHist=[entrada].concat(hist).slice(0,52);
              savHist(nuevoHist);
              var nuevosRegs=Object.assign({},regs);
              Object.keys(nuevosRegs).forEach(function(k){if(k.startsWith(fecha+"|"))delete nuevosRegs[k];});
              savRegs(nuevosRegs);
              setVista("historial");
            }} style={{flex:1,padding:"13px",background:"rgba(74,222,128,0.1)",border:"2px solid rgba(74,222,128,0.3)",borderRadius:11,fontSize:14,fontWeight:900,color:"#4ade80",cursor:"pointer",fontFamily:"system-ui"}}>Cerrar dia</button>
          </div>
        </div>
      </div>
    );
  }

  // CAPTURA POR AREA
  if(vista==="captura"&&areaActual){
    var trab=trabArea(areaActual);
    var rA=regsArea(areaActual);
    var k=fecha+"|"+areaActual;

    function toggle(nom,tipo){var ya=rA.find(function(r){return r.nombre===nom&&!r.areaExtra;});var nr=Object.assign({},regs);if(ya){nr[k]=(nr[k]||[]).filter(function(r){return !(r.nombre===nom&&!r.areaExtra);});}else{nr[k]=(nr[k]||[]).concat([{id:Date.now()+"_"+nom,nombre:nom,tipo:tipo,horas:1,precio:null,areaExtra:null,de:"",a:""}]);}if((nr[k]||[]).length===0)delete nr[k];savRegs(nr);}
    function setH(id,h){
      var nr=JSON.parse(JSON.stringify(regs));
      if(!nr[k])return;
      var encontrado=false;
      nr[k]=nr[k].map(function(r){
        if(r.id===id){encontrado=true;return Object.assign({},r,{horas:h});}
        return r;
      });
      if(encontrado)savRegs(nr);
    }
    function calcHorasDe(de,a2){
      if(!de||!a2)return null;
      var parseHora=function(s){
        s=s.trim().replace(/[hH]/g,":");
        var pm=s.toLowerCase().indexOf("pm")>=0;
        var am=s.toLowerCase().indexOf("am")>=0;
        s=s.replace(/[aApPmM]/g,"").trim();
        var parts=s.split(":");
        var h=parseInt(parts[0])||0;
        var m=parseInt(parts[1])||0;
        if(pm&&h<12)h+=12;
        if(am&&h===12)h=0;
        return h*60+m;
      };
      var minDe=parseHora(de);
      var minA=parseHora(a2);
      if(isNaN(minDe)||isNaN(minA))return null;
      var diff=minA-minDe;
      if(diff<=0)diff+=24*60; // cruzo medianoche
      var hrs=diff/60;
      // Redondear a .5 mas cercano
      return Math.round(hrs*2)/2;
    }
    function setHorario(id,campo,val){
      var nr=JSON.parse(JSON.stringify(regs));
      if(!nr[k])return;
      nr[k]=nr[k].map(function(r){
        if(r.id!==id)return r;
        var n=Object.assign({},r);
        n[campo]=val;
        return n;
      });
      savRegs(nr);
    }
    function aplicarHorarioTodos(de,a2){
      var hrs=calcHorasDe(de,a2);
      var nr=JSON.parse(JSON.stringify(regs));
      if(!nr[k])return;
      nr[k]=nr[k].map(function(r){
        if(r.areaExtra)return r;
        var n=Object.assign({},r,{de:de,a:a2});
        if(hrs&&hrs>0)n.horas=hrs;
        return n;
      });
      savRegs(nr);
    }
    function setPrEsp(id,p){var nr=Object.assign({},regs);nr[k]=(nr[k]||[]).map(function(r){return r.id===id?Object.assign({},r,{precio:p}):r;});savRegs(nr);}
    function todos(){var nr=Object.assign({},regs);var extras=(nr[k]||[]).filter(function(r){return r.areaExtra;});nr[k]=extras.concat(trab.map(function(t){return{id:Date.now()+"_"+t.n,nombre:t.n,tipo:t.t,horas:1,precio:null,areaExtra:null,de:"",a:""};}));savRegs(nr);}
    function ninguno(){var nr=Object.assign({},regs);nr[k]=(nr[k]||[]).filter(function(r){return r.areaExtra;});if((nr[k]||[]).length===0)delete nr[k];savRegs(nr);}
    function aplicarTodos(h){var nr=JSON.parse(JSON.stringify(regs));if(!nr[k])return;nr[k]=nr[k].map(function(r){return r.areaExtra?r:Object.assign({},r,{horas:h});});savRegs(nr);}
    function agregarExtra(){if(!extNom||!extArea)return;var t2=trabArea(areaActual).find(function(t){return t.n===extNom;});var k2=fecha+"|"+extArea;var nr=Object.assign({},regs);nr[k2]=(nr[k2]||[]).concat([{id:Date.now()+"_ext",nombre:extNom,tipo:t2?t2.t:"foraneo",horas:extHrs,precio:null,areaExtra:extArea,areaOrigen:areaActual}]);savRegs(nr);setShowExtra(false);}
    function quitarReg(id,areaCargo){var k3=fecha+"|"+areaCargo;var nr=Object.assign({},regs);nr[k3]=(nr[k3]||[]).filter(function(r){return r.id!==id;});if((nr[k3]||[]).length===0)delete nr[k3];savRegs(nr);}
    function cerrarDia(){
      var r2=regsArea(areaActual);
      var externas=[];
      Object.keys(regs).forEach(function(ky){
        if(!ky.startsWith(fecha+"|"))return;
        var ac=ky.split("|")[1];
        if(ac===areaActual)return;
        (regs[ky]||[]).forEach(function(r){
          if(r.areaOrigen===areaActual&&r.areaExtra)externas.push(r);
        });
      });
      var todasHoras=r2.concat(externas);
      if(!todasHoras.length){
        alert("No hay registros para cerrar. Asegurate de haber guardado las horas primero.");
        return;
      }
      var histIdx=hist.findIndex(function(h){return h.fecha===fecha;});
      var nuevoHist=hist.slice();
      if(histIdx>=0){
        var entrada=JSON.parse(JSON.stringify(nuevoHist[histIdx]));
        entrada.areas=entrada.areas||{};
        // Guardar registros propios del area
        if(r2.length>0)entrada.areas[areaActual]=r2.slice();
        // Guardar registros cargados a otras areas (agrupados por area de cargo)
        externas.forEach(function(r){
          var ac=r.areaExtra;
          entrada.areas[ac]=entrada.areas[ac]||[];
          if(!entrada.areas[ac].find(function(x){return x.id===r.id;}))entrada.areas[ac].push(r);
        });
        nuevoHist[histIdx]=entrada;
      } else {
        var entrada2={id:Date.now(),fecha:fecha,precio:precio,areas:{}};
        if(r2.length>0)entrada2.areas[areaActual]=r2.slice();
        externas.forEach(function(r){
          var ac=r.areaExtra;
          entrada2.areas[ac]=entrada2.areas[ac]||[];
          entrada2.areas[ac].push(r);
        });
        nuevoHist=[entrada2].concat(nuevoHist).slice(0,52);
      }
      savHist(nuevoHist);
      // Limpiar registros del dia del area actual y los externos
      var nr=Object.assign({},regs);
      delete nr[fecha+"|"+areaActual];
      Object.keys(nr).forEach(function(ky){
        if(!ky.startsWith(fecha+"|"))return;
        nr[ky]=(nr[ky]||[]).filter(function(r){return r.areaOrigen!==areaActual;});
        if((nr[ky]||[]).length===0)delete nr[ky];
      });
      savRegs(nr);
      // Mostrar reporte del area para imprimir
      setVista("reporte_area");
    }

    var base=rA.filter(function(r){return !r.areaExtra;});
    var extOtras=[];
    Object.keys(regs).forEach(function(ky){if(!ky.startsWith(fecha+"|"))return;var ac=ky.split("|")[1];if(ac===areaActual)return;(regs[ky]||[]).forEach(function(r){if(r.areaOrigen===areaActual&&r.areaExtra)extOtras.push(Object.assign({},r,{areaCargo:ac}));});});
    var totArea=rA.reduce(function(s,r){return s+r.horas;},0)+extOtras.reduce(function(s,r){return s+r.horas;},0);

    return(
      <div style={{background:"#080f14",minHeight:"100vh"}}>
        <div style={{background:"rgba(0,0,0,0.85)",borderBottom:"2px solid rgba(251,191,36,0.25)",padding:"0 16px",display:"flex",alignItems:"center",height:62,position:"sticky",top:0,zIndex:50}} className="no-print">
          <button onClick={function(){setVista(esMaestro?"menu":"login");}} style={{marginRight:14,padding:"8px 14px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#9ca3af",fontSize:14,cursor:"pointer",fontFamily:"system-ui"}}>Volver</button>

          <div style={{fontSize:13,color:"#6b7280"}}>{fecha}</div>
        </div>
        <div style={{maxWidth:700,margin:"0 auto",padding:"18px 14px 80px"}}>

          <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.09)",borderRadius:12,padding:"14px",marginBottom:14}}>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
              <button onClick={todos} style={{padding:"9px 16px",background:"rgba(251,191,36,0.15)",border:"2px solid rgba(251,191,36,0.3)",borderRadius:9,color:COL,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"system-ui"}}>Seleccionar todos</button>
              <button onClick={ninguno} style={{padding:"9px 16px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#9ca3af",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Quitar todos</button>
            </div>
            {base.length>0&&(
              <div>
                <div style={{fontSize:11,color:"#6b7280",marginBottom:8}}>APLICAR A TODOS LOS SELECCIONADOS</div>

                  <div>
                    <div style={{fontSize:10,color:"#6b7280",marginBottom:4}}>Inicio</div>
                    <input placeholder="22:00" style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid rgba(251,191,36,0.3)",borderRadius:7,padding:"8px",color:"#fbbf24",fontFamily:"system-ui",fontSize:14,fontWeight:700,outline:"none"}} value={horaDe} onChange={function(e){setHoraDe(e.target.value);}}/>
                  </div>
                  <div>
                    <div style={{fontSize:10,color:"#6b7280",marginBottom:4}}>Fin</div>
                    <input placeholder="02:00" style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid rgba(251,191,36,0.3)",borderRadius:7,padding:"8px",color:"#fbbf24",fontFamily:"system-ui",fontSize:14,fontWeight:700,outline:"none"}} value={horaA} onChange={function(e){setHoraA(e.target.value);}}/>
                  </div>
                  <button onClick={function(){
                    if(!horaDe||!horaA)return;
                    var hrs=calcHorasDe(horaDe,horaA);
                    if(hrs&&hrs>0){aplicarTodos(hrs);aplicarHorarioTodos(horaDe,horaA);}
                  }} style={{padding:"8px 14px",background:"rgba(251,191,36,0.2)",border:"2px solid rgba(251,191,36,0.5)",borderRadius:8,color:"#fbbf24",fontWeight:900,cursor:"pointer",fontFamily:"system-ui",fontSize:13,whiteSpace:"nowrap"}}>
                    Calcular
                  </button>
                </div>
                {horaDe&&horaA?(
                  <div style={{background:"rgba(251,191,36,0.12)",border:"2px solid rgba(251,191,36,0.4)",borderRadius:9,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontSize:13,color:"#9ca3af"}}>{horaDe} a {horaA}</div>
                    <div style={{fontSize:26,fontWeight:900,color:"#fbbf24",fontFamily:"Georgia,serif"}}>
                      {calcHorasDe(horaDe,horaA)>0?calcHorasDe(horaDe,horaA)+" hrs":"--"}
                    </div>
                  </div>
                ):<div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.08)",borderRadius:9,padding:"12px 16px",textAlign:"center",color:"#4a6a7a",fontSize:13}}>Pon inicio y fin para calcular</div>}
              </div>
            )}
          </div>

          <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.09)",borderRadius:12,padding:"14px",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:900,color:"#f0f0e8",marginBottom:12}}>Plantilla ({trab.length})</div>
            {trab.map(function(t){
              var reg=rA.find(function(r){return r.nombre===t.n&&!r.areaExtra;});
              var pr=reg?(reg.precio||precio):precio;
              return(
                <div key={t.n} style={{padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:reg?8:0}}>
                    <button onClick={function(){toggle(t.n,t.t);}} style={{width:28,height:28,borderRadius:6,border:"2px solid "+(reg?"rgba(251,191,36,0.6)":"rgba(255,255,255,0.2)"),background:reg?"rgba(251,191,36,0.2)":"transparent",cursor:"pointer",flexShrink:0,color:reg?COL:"transparent",fontSize:16,fontWeight:900}}>{reg?"v":""}</button>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:reg?800:500,color:reg?"#f0f0e8":"#6b7280"}}>{t.n}</div>
                      <div style={{fontSize:11,color:t.t==="local"?"#4ade80":"#60a5fa"}}>{t.t}</div>
                    </div>
                    {reg&&<button onClick={function(){quitarReg(reg.id,areaActual);}} style={{padding:"4px 8px",background:"transparent",border:"1px solid rgba(248,113,113,0.3)",borderRadius:5,color:"#f87171",fontSize:11,cursor:"pointer",fontFamily:"system-ui"}}>X</button>}
                  </div>
                  {reg&&(
                    <div style={{paddingLeft:38}}>
                      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
                          <input placeholder="Inicio" style={{flex:1,background:"rgba(0,0,0,0.4)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:6,padding:"6px 8px",color:"#fbbf24",fontFamily:"system-ui",fontSize:13,fontWeight:700,outline:"none"}} value={reg.de||""} onChange={function(e){setHorario(reg.id,"de",e.target.value);}}/>
                          <input placeholder="Fin" style={{flex:1,background:"rgba(0,0,0,0.4)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:6,padding:"6px 8px",color:"#fbbf24",fontFamily:"system-ui",fontSize:13,fontWeight:700,outline:"none"}} value={reg.a||""} onChange={function(e){setHorario(reg.id,"a",e.target.value);}}/>
                          <button onClick={function(){
                            var hrs=calcHorasDe(reg.de||"",reg.a||"");
                            if(hrs&&hrs>0)setH(reg.id,hrs);
                          }} style={{padding:"6px 12px",background:"rgba(251,191,36,0.15)",border:"1px solid rgba(251,191,36,0.4)",borderRadius:6,color:"#fbbf24",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"system-ui"}}>Calc</button>
                          <div style={{background:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:6,padding:"6px 12px",fontSize:16,fontWeight:900,color:"#fbbf24",fontFamily:"Georgia,serif",minWidth:50,textAlign:"center"}}>{reg.horas}</div>
                        </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{fontSize:11,color:"#6b7280"}}>Precio/hr:</div>
                        {precioEsp===reg.id
                          ?<div style={{display:"flex",gap:6}}><input type="number" style={{width:80,background:"rgba(0,0,0,0.4)",border:"1px solid rgba(251,191,36,0.4)",borderRadius:6,padding:"4px 8px",color:COL,fontWeight:700,fontSize:14,outline:"none"}} defaultValue={pr} onBlur={function(e){setPrEsp(reg.id,parseFloat(e.target.value)||precio);setPrecioEsp(null);}}/><button onClick={function(){setPrecioEsp(null);}} style={{padding:"4px 8px",background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:5,color:"#6b7280",fontSize:11,cursor:"pointer",fontFamily:"system-ui"}}>OK</button></div>
                          :<div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:13,fontWeight:700,color:reg.precio?"#fb923c":COL}}>{fmt(pr)}</span><button onClick={function(){setPrecioEsp(reg.id);}} style={{padding:"3px 8px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:5,color:"#6b7280",fontSize:11,cursor:"pointer",fontFamily:"system-ui"}}>editar</button><span style={{fontSize:12,color:"#9ca3af"}}>= {fmt(reg.horas*pr)}</span></div>
                        }
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          <div style={{background:"rgba(96,165,250,0.06)",border:"2px solid rgba(96,165,250,0.25)",borderRadius:12,padding:"14px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:13,fontWeight:900,color:"#60a5fa"}}>Horas en otra area</div>
              <button onClick={function(){setShowExtra(true);setExtSel([]);setExtArea("");setExtHrs(0);setExtDe("");setExtA("");setExtHrsInd({});}} style={{padding:"7px 14px",background:"rgba(96,165,250,0.15)",border:"2px solid rgba(96,165,250,0.3)",borderRadius:8,color:"#60a5fa",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"system-ui"}}>+ Agregar</button>
            </div>
            {extOtras.length===0
              ?<div style={{fontSize:13,color:"#4a6a7a",textAlign:"center",padding:"6px 0"}}>Sin horas en otras areas</div>
              :extOtras.map(function(r){return(<div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}><div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:"#f0f0e8"}}>{r.nombre}</div><div style={{fontSize:11,color:"#60a5fa"}}>Cargo: {r.areaCargo} . {r.de&&r.a?r.de+" - "+r.a:r.horas+"hrs"}</div></div><div style={{fontSize:20,fontWeight:900,color:"#60a5fa",fontFamily:"Georgia,serif"}}>{r.horas}hrs</div><button onClick={function(){quitarReg(r.id,r.areaCargo);}} style={{padding:"5px 10px",background:"transparent",border:"1px solid rgba(248,113,113,0.3)",borderRadius:6,color:"#f87171",fontSize:12,cursor:"pointer",fontFamily:"system-ui"}}>X</button></div>);})}
          </div>

          {totArea>0&&<div style={{background:"rgba(251,191,36,0.1)",border:"2px solid rgba(251,191,36,0.4)",borderRadius:12,padding:"14px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:rA.filter(function(r){return !r.areaExtra;}).length>0&&extOtras.length>0?8:0}}>

                <div style={{fontSize:26,fontWeight:900,color:COL,fontFamily:"Georgia,serif"}}>{totArea} hrs</div>
              </div>
            </div>
            {rA.filter(function(r){return !r.areaExtra;}).length>0&&<div style={{fontSize:12,color:"#9ca3af"}}>{rA.filter(function(r){return !r.areaExtra;}).reduce(function(s,r){return s+r.horas;},0)} hrs en {areaActual}</div>}
            {extOtras.length>0&&extOtras.reduce(function(acc,r){acc[r.areaCargo]=(acc[r.areaCargo]||0)+r.horas;return acc;},{}) && Object.entries ? Object.keys(extOtras.reduce(function(acc,r){acc[r.areaCargo]=(acc[r.areaCargo]||0)+r.horas;return acc;},{})).map(function(a){var h=extOtras.filter(function(r){return r.areaCargo===a;}).reduce(function(s,r){return s+r.horas;},0);return <div key={a} style={{fontSize:12,color:"#60a5fa"}}>{h} hrs cargadas a {a}</div>;}) : null}
          </div>}

          <button onClick={cerrarDia} style={{width:"100%",padding:"14px",background:"rgba(74,222,128,0.15)",border:"2px solid rgba(74,222,128,0.4)",borderRadius:11,fontSize:16,fontWeight:900,color:"#4ade80",cursor:"pointer",fontFamily:"system-ui",marginBottom:8}}>Cerrar dia</button>
          <div style={{fontSize:11,color:"#4a6a7a",textAlign:"center",marginBottom:14}}>Al cerrar, ya no podras editar sin autorizacion del maestro</div>

          {showExtra&&(
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:200,overflowY:"auto",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:16}}>
              <div style={{background:"#080f14",border:"2px solid rgba(96,165,250,0.4)",borderRadius:14,padding:"20px",maxWidth:480,width:"100%",marginTop:20}}>
                <div style={{fontSize:16,fontWeight:900,color:"#60a5fa",marginBottom:16}}>Horas en otra area</div>
                <div style={{marginBottom:12}}><label style={LBL}>Area donde se cargan las horas</label><select style={INP} value={extArea} onChange={function(e){setExtArea(e.target.value);}}><option value="">-- Seleccionar area --</option>{AREAS.filter(function(a){return a!==areaActual;}).map(function(a){return <option key={a} value={a}>{a}</option>;})}</select></div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:8,alignItems:"flex-end",marginBottom:8}}>
                  <div><div style={{fontSize:10,color:"#6b7280",marginBottom:4}}>Inicio</div><input placeholder="22:00" style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"1px solid rgba(96,165,250,0.3)",borderRadius:6,padding:"8px",color:"#60a5fa",fontFamily:"system-ui",fontSize:14,fontWeight:700,outline:"none"}} value={extDe} onChange={function(e){setExtDe(e.target.value);}}/></div>
                  <div><div style={{fontSize:10,color:"#6b7280",marginBottom:4}}>Fin</div><input placeholder="01:00" style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"1px solid rgba(96,165,250,0.3)",borderRadius:6,padding:"8px",color:"#60a5fa",fontFamily:"system-ui",fontSize:14,fontWeight:700,outline:"none"}} value={extA} onChange={function(e){setExtA(e.target.value);}}/></div>
                  <button onClick={function(){var hrs=calcHorasDe(extDe,extA);if(hrs&&hrs>0)setExtHrs(hrs);}} style={{padding:"8px 12px",background:"rgba(96,165,250,0.15)",border:"2px solid rgba(96,165,250,0.4)",borderRadius:8,color:"#60a5fa",fontWeight:900,cursor:"pointer",fontFamily:"system-ui",fontSize:13}}>Calc</button>
                </div>
                <div style={{background:"rgba(96,165,250,0.1)",border:"2px solid rgba(96,165,250,0.3)",borderRadius:8,padding:"10px",textAlign:"center",fontSize:24,fontWeight:900,color:"#60a5fa",fontFamily:"Georgia,serif",marginBottom:14}}>{extHrs>0?extHrs+" hrs":"-- hrs"}</div>
                <div style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <label style={LBL}>Trabajadores ({extSel.length} sel.)</label>

                              <input placeholder="Fin" style={{flex:1,background:"rgba(0,0,0,0.3)",border:"1px solid rgba(96,165,250,0.2)",borderRadius:5,padding:"5px 7px",color:"#60a5fa",fontFamily:"system-ui",fontSize:12,fontWeight:700,outline:"none"}} onChange={function(e){var ni=Object.assign({},extHrsInd);ni[t.n+"_a"]=e.target.value;setExtHrsInd(ni);}}/>

  // RESUMEN
  if(vista==="resumen"){

    function getRegsFiltered(a){var r=regsArea(a);if(filtroTipo==="locales")return r.filter(function(x){return x.tipo==="local";});if(filtroTipo==="foraneos")return r.filter(function(x){return x.tipo==="foraneo";});return r;}
    return(

        </div>

          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}} className="no-print">
            <div style={{fontSize:11,color:"#4a6a7a",fontWeight:800,marginRight:6,alignSelf:"center"}}>TIPO:</div>
            {["todos","locales","foraneos"].map(function(t){return(<button key={t} onClick={function(){setFiltroTipo(t);}} style={{padding:"6px 14px",border:"2px solid "+(filtroTipo===t?COL:"rgba(255,255,255,0.1)"),borderRadius:18,background:filtroTipo===t?"rgba(251,191,36,0.15)":"transparent",color:filtroTipo===t?COL:"#6b7280",fontFamily:"system-ui",fontSize:12,fontWeight:700,cursor:"pointer",textTransform:"capitalize"}}>{t}</button>);})}

            {areasReg.map(function(a){return(<button key={a} onClick={function(){setFiltroHist(a);}} style={{padding:"6px 14px",border:"2px solid "+(filtroHist===a?COL:"rgba(255,255,255,0.1)"),borderRadius:18,background:filtroHist===a?"rgba(251,191,36,0.15)":"transparent",color:filtroHist===a?COL:"#6b7280",fontFamily:"system-ui",fontSize:12,fontWeight:700,cursor:"pointer"}}>{a}</button>);})}

          <div style={{marginBottom:16,paddingBottom:14,borderBottom:"2px solid rgba(255,255,255,0.08)"}}>

          </div>
          {!filtradas.length?<div style={{textAlign:"center",padding:60,color:"#4a6a7a"}}>Sin registros</div>:filtradas.map(function(a){
            var r=getRegsFiltered(a);if(!r.length)return null;
            var h=r.reduce(function(s,x){return s+x.horas;},0);
            var costo=r.reduce(function(s,x){return s+(x.horas*(x.precio||precio));},0);
            return(<div key={a} className={"pcard pcard-area"} style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(251,191,36,0.2)",borderRadius:12,marginBottom:14,overflow:"hidden"}}>
              <div style={{background:"rgba(251,191,36,0.1)",borderBottom:"2px solid rgba(251,191,36,0.2)",padding:"11px 18px"}}>
                <div style={{fontSize:10,color:"#6b7280",marginBottom:2}}>PARRAS VALLEY - HORAS EXTRA - {fecha}</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:19,fontWeight:900,color:COL}}>{a}</div>

                </div>
              </div>
              <div style={{padding:"12px 18px"}}>
                {["local","foraneo"].map(function(tipo){
                  var lista=r.filter(function(x){return x.tipo===tipo;});if(!lista.length)return null;
                  var col=tipo==="local"?"#4ade80":"#60a5fa";
                  return(<div key={tipo} style={{marginBottom:10}}>

                      {lista.map(function(rx){var p=rx.precio||precio;return(<tr key={rx.id} style={{borderBottom:"1px solid rgba(255,255,255,0.05)"}}><td style={{padding:"7px 4px",fontSize:14,fontWeight:700,color:"#f0f0e8"}}>{rx.nombre}</td>{rx.areaExtra&&<td style={{padding:"7px 4px",fontSize:11,color:"#60a5fa"}}>cargo: {rx.areaExtra}</td>}<td style={{padding:"7px 4px",textAlign:"right",fontSize:16,fontWeight:900,color:col,fontFamily:"Georgia,serif"}}>{rx.horas}hrs</td><td style={{padding:"7px 4px",textAlign:"right",fontSize:13,color:"#9ca3af"}}>{fmt(rx.horas*p)}</td></tr>);})}

        </div>
      </div>
    );

  // HISTORIAL
  if(vista==="historial"){
    var s_hDia=useState(hist.length>0?hist[0].id:null); var hDia=s_hDia[0]; var setHDia=s_hDia[1];
    var s_hArea=useState(null); var hArea=s_hArea[0]; var setHArea=s_hArea[1];

    var entradaSel=hist.find(function(h){return h.id===hDia;})||hist[0];

    var areasDisp=entradaSel?Object.keys(entradaSel.areas||[]):[];
    var areasFilt=hArea?areasDisp.filter(function(a){return a===hArea;}):areasDisp;

    function getRegs(a){
      var r=(entradaSel&&entradaSel.areas&&entradaSel.areas[a])||[];
      if(hTipo==="local")return r.filter(function(x){return x.tipo==="local";});
      if(hTipo==="foraneo")return r.filter(function(x){return x.tipo==="foraneo";});
      return r;
    }

    return(
      <div style={{background:"#080f14",minHeight:"100vh"}}>
        <div style={{background:"rgba(0,0,0,0.85)",borderBottom:"2px solid rgba(96,165,250,0.25)",padding:"0 16px",display:"flex",alignItems:"center",height:62,position:"sticky",top:0,zIndex:50}} className="no-print">
          <button onClick={function(){setVista("menu");}} style={{marginRight:14,padding:"8px 14px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#9ca3af",fontSize:14,cursor:"pointer",fontFamily:"system-ui"}}>Volver</button>
          <div style={{fontSize:18,fontWeight:900,color:"#60a5fa",flex:1}}>Historial</div>
          <button onClick={function(){window.print();}} style={{padding:"9px 18px",background:"linear-gradient(135deg,#78350f,#fbbf24)",border:"none",borderRadius:9,color:"#000",fontSize:14,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Imprimir</button>

        <div style={{maxWidth:900,margin:"0 auto",padding:"18px 14px 80px"}}>
          {!hist.length?<div style={{textAlign:"center",padding:60,color:"#4a6a7a",fontSize:16}}>Sin historial aun</div>:(
            <div>
              {/* Filtro de fecha */}
              <div style={{marginBottom:12}} className="no-print">

                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {hist.map(function(h){return(<button key={h.id} onClick={function(){setHDia(h.id);setHArea(null);}} style={{padding:"7px 14px",border:"2px solid "+(hDia===h.id?"rgba(96,165,250,0.6)":"rgba(255,255,255,0.1)"),borderRadius:18,background:hDia===h.id?"rgba(96,165,250,0.15)":"transparent",color:hDia===h.id?"#60a5fa":"#6b7280",fontFamily:"system-ui",fontSize:13,fontWeight:700,cursor:"pointer"}}>{h.fecha}</button>);})}
                </div>
              </div>

              {/* Filtro tipo */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}} className="no-print">

                {["todos","foraneo","local"].map(function(t){return(<button key={t} onClick={function(){setHTipo(t);}} style={{padding:"6px 14px",border:"2px solid "+(hTipo===t?"rgba(251,191,36,0.6)":"rgba(255,255,255,0.1)"),borderRadius:18,background:hTipo===t?"rgba(251,191,36,0.15)":"transparent",color:hTipo===t?COL:"#6b7280",fontFamily:"system-ui",fontSize:12,fontWeight:700,cursor:"pointer"}}>{t==="todos"?"Todos":t==="foraneo"?"Foraneos":"Locales"}</button>);})}
              </div>

              {/* Filtro area */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:20}} className="no-print">
                <div style={{fontSize:11,color:"#4a6a7a",fontWeight:800,alignSelf:"center",marginRight:4}}>AREA:</div>
                <button onClick={function(){setHArea(null);}} style={{padding:"6px 14px",border:"2px solid "+(hArea===null?"rgba(96,165,250,0.6)":"rgba(255,255,255,0.1)"),borderRadius:18,background:hArea===null?"rgba(96,165,250,0.15)":"transparent",color:hArea===null?"#60a5fa":"#6b7280",fontFamily:"system-ui",fontSize:12,fontWeight:700,cursor:"pointer"}}>Todas</button>
                {areasDisp.map(function(a){return(<button key={a} onClick={function(){setHArea(a);}} style={{padding:"6px 14px",border:"2px solid "+(hArea===a?"rgba(96,165,250,0.6)":"rgba(255,255,255,0.1)"),borderRadius:18,background:hArea===a?"rgba(96,165,250,0.15)":"transparent",color:hArea===a?"#60a5fa":"#6b7280",fontFamily:"system-ui",fontSize:12,fontWeight:700,cursor:"pointer"}}>{a}</button>);})}

                <div style={{fontSize:14,color:"#9ca3af",marginTop:4}}>
                  Fecha: {entradaSel?entradaSel.fecha:""} . 
                  {hTipo==="todos"?" Locales y Foraneos":hTipo==="local"?" Solo Locales":" Solo Foraneos"} .

                </div>
              </div>

              {/* Reporte por area */}
              {areasFilt.map(function(a){
                var r=getRegs(a);
                if(!r.length)return null;
                var hA=r.reduce(function(s,x){return s+x.horas;},0);
                var costo=r.reduce(function(s,x){return s+(x.horas*(x.precio||pr));},0);
                var loc=r.filter(function(x){return x.tipo==="local";});
                var for2=r.filter(function(x){return x.tipo==="foraneo";});
                return(<div key={a} className="pcard pcard-area" style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(96,165,250,0.25)",borderRadius:12,marginBottom:16,overflow:"hidden"}}>

                    <div style={{fontSize:10,color:"#4a6a7a",marginBottom:3}}>PARRAS VALLEY . HORAS EXTRA . {entradaSel?entradaSel.fecha:""} . {hTipo==="todos"?"LOCALES Y FORANEOS":hTipo==="local"?"LOCALES":"FORANEOS"}</div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{fontSize:19,fontWeight:900,color:"#60a5fa"}}>{a}</div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:11,color:"#9ca3af"}}>{r.length} personas</div>
                        <div style={{fontSize:18,fontWeight:900,color:"#60a5fa",fontFamily:"Georgia,serif"}}>{hA} hrs . {fmt(costo)}</div>

                  <div style={{padding:"12px 18px"}}>
                    {[{label:"Foraneos",lista:for2,col:"#60a5fa"},{label:"Locales",lista:loc,col:"#4ade80"}].map(function(g){
                      if(!g.lista.length)return null;

                        <div style={{fontSize:11,fontWeight:800,color:g.col,marginBottom:8,textTransform:"uppercase"}}>{g.label} ({g.lista.length})</div>

                          <thead><tr style={{background:"rgba(0,0,0,0.3)"}}>
                            <th style={{padding:"6px 8px",textAlign:"left",fontSize:11,color:"#4a6a7a",fontWeight:800}}>Nombre</th>

                          </tr></thead>

                                <td style={{padding:"8px",fontSize:14,fontWeight:700,color:"#f0f0e8"}}>{rx.nombre}{rx.areaExtra&&<span style={{fontSize:11,color:"#fb923c",display:"block"}}>cargo: {rx.areaExtra}</span>}</td>
                                <td style={{padding:"8px",fontSize:13,color:"#fbbf24"}}>{rx.de&&rx.a?rx.de+" - "+rx.a:"-"}</td>
                                <td style={{padding:"8px",textAlign:"right",fontSize:16,fontWeight:900,color:g.col,fontFamily:"Georgia,serif"}}>{rx.horas}</td>
                                <td style={{padding:"8px",textAlign:"right",fontSize:13,color:"#9ca3af"}}>{fmt(rx.horas*p)}</td>
                              </tr>
                            );})}
                          </tbody>
                        </table>
                      </div>);
                    })}
                  </div>
                </div>);
              })}

              {/* Total general */}
              {areasFilt.length>0&&(function(){
                var totHrs=areasFilt.reduce(function(s,a){return s+getRegs(a).reduce(function(ss,r){return ss+r.horas;},0);},0);
                var totCosto=areasFilt.reduce(function(s,a){return s+getRegs(a).reduce(function(ss,r){return ss+(r.horas*(r.precio||pr));},0);},0);
                var totPersonas=areasFilt.reduce(function(s,a){return s+getRegs(a).length;},0);
                if(!totHrs)return null;
                return(<div style={{background:"rgba(251,191,36,0.1)",border:"2px solid rgba(251,191,36,0.4)",borderRadius:12,padding:"16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><div style={{fontSize:17,fontWeight:900,color:COL}}>TOTAL GENERAL</div><div style={{fontSize:13,color:"#9ca3af"}}>{totPersonas} personas</div></div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:30,fontWeight:900,color:COL,fontFamily:"Georgia,serif"}}>{totHrs} hrs</div><div style={{fontSize:16,color:"#9ca3af"}}>{fmt(totCosto)}</div></div>
                </div>);
              })()}

              {esMaestro&&entradaSel&&<button onClick={function(){var nh=hist.filter(function(x){return x.id!==entradaSel.id;});savHist(nh);setHDia(null);}} style={{marginTop:16,padding:"10px 22px",background:"transparent",border:"2px solid rgba(248,113,113,0.2)",borderRadius:9,fontSize:13,fontWeight:800,color:"#6b7280",cursor:"pointer",fontFamily:"system-ui"}} className="no-print">Borrar este dia</button>}
            </div>
          )}
        </div>
      </div>
    );
  }

  // PLANTILLA
  if(vista==="plantilla"&&esMaestro){
    var aE=areaActual||AREAS[0];
    var pA=plant[aE]||{foraneos:[],locales:[]};
    function borrarDe(nom,tipo){var p=JSON.parse(JSON.stringify(plant));p[aE]=p[aE]||{foraneos:[],locales:[]};p[aE][tipo]=(p[aE][tipo]||[]).filter(function(n){return n!==nom;});savPlant(p);}
    function moverA(nom,tipo){if(!moverDest)return;var p=JSON.parse(JSON.stringify(plant));p[aE][tipo]=(p[aE][tipo]||[]).filter(function(n){return n!==nom;});p[moverDest]=p[moverDest]||{foraneos:[],locales:[]};if((p[moverDest][moverTipo]||[]).indexOf(nom)<0)p[moverDest][moverTipo]=(p[moverDest][moverTipo]||[]).concat([nom]);savPlant(p);setMoverM(null);}
    function agregar(){if(!nuevoNom.trim())return;var p=JSON.parse(JSON.stringify(plant));p[aE]=p[aE]||{foraneos:[],locales:[]};var lista=nuevoTipo==="local"?"locales":"foraneos";if((p[aE][lista]||[]).indexOf(nuevoNom.trim())<0)p[aE][lista]=(p[aE][lista]||[]).concat([nuevoNom.trim()]);savPlant(p);setNuevoNom("");}
    return(
      <div style={{background:"#080f14",minHeight:"100vh"}}>
        <div style={{background:"rgba(0,0,0,0.85)",borderBottom:"2px solid rgba(251,191,36,0.25)",padding:"0 16px",display:"flex",alignItems:"center",height:62,position:"sticky",top:0,zIndex:50}}>
          <button onClick={function(){setVista("menu");}} style={{marginRight:14,padding:"8px 14px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#9ca3af",fontSize:14,cursor:"pointer",fontFamily:"system-ui"}}>Volver</button>
          <div style={{fontSize:18,fontWeight:900,color:COL,flex:1}}>Plantilla</div>
        </div>
        <div style={{maxWidth:700,margin:"0 auto",padding:"18px 14px 80px"}}>
          <div style={{marginBottom:14}}><label style={LBL}>Area</label><select style={INP} value={aE} onChange={function(e){setAreaAuth(e.target.value);}}>{AREAS.map(function(a){return <option key={a} value={a}>{a}</option>;})}</select></div>
          <div style={{background:"rgba(251,191,36,0.06)",border:"2px solid rgba(251,191,36,0.2)",borderRadius:12,padding:"14px",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:900,color:COL,marginBottom:10}}>Agregar a {aE}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
              <input style={Object.assign({},INP,{flex:1,minWidth:180})} placeholder="Nombre completo" value={nuevoNom} onChange={function(e){setNuevoNom(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")agregar();}}/>
              <select style={Object.assign({},INP,{maxWidth:130})} value={nuevoTipo} onChange={function(e){setNuevoTipo(e.target.value);}}><option value="foraneo">Foraneo</option><option value="local">Local</option></select>
            </div>
            <button onClick={agregar} style={{padding:"10px 20px",background:"rgba(251,191,36,0.15)",border:"2px solid rgba(251,191,36,0.3)",borderRadius:9,color:COL,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Agregar</button>
          </div>
          {["locales","foraneos"].map(function(tipo){
            var lista=pA[tipo]||[];var col=tipo==="locales"?"#4ade80":"#60a5fa";
            if(!lista.length)return null;
            return(<div key={tipo} style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"14px",marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:900,color:col,marginBottom:10}}>{tipo==="locales"?"Locales":"Foraneos"} ({lista.length})</div>
              {lista.map(function(nom){return(<div key={nom} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}><div style={{flex:1,fontSize:15,fontWeight:700,color:"#f0f0e8"}}>{nom}</div><button onClick={function(){setMoverM({nom:nom,tipo:tipo});setMoverDest("");setMoverTipo("foraneos");}} style={{padding:"5px 10px",background:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:6,color:COL,fontSize:12,cursor:"pointer",fontFamily:"system-ui"}}>Mover</button><button onClick={function(){borrarDe(nom,tipo);}} style={{padding:"5px 10px",background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.3)",borderRadius:6,color:"#f87171",fontSize:12,cursor:"pointer",fontFamily:"system-ui"}}>Borrar</button></div>);})}
            </div>);
          })}
        </div>
        {moverM&&(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.9)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><div style={{background:"#080f14",border:"2px solid rgba(251,191,36,0.4)",borderRadius:14,padding:"24px",maxWidth:360,width:"100%"}}><div style={{fontSize:15,fontWeight:900,color:COL,marginBottom:5}}>Mover persona</div><div style={{fontSize:13,color:"#9ca3af",marginBottom:18}}>{moverM.nom}</div><div style={{marginBottom:12}}><label style={LBL}>Area destino</label><select style={INP} value={moverDest} onChange={function(e){setMoverDest(e.target.value);}}><option value="">-- Seleccionar --</option>{AREAS.filter(function(a){return a!==aE;}).map(function(a){return <option key={a} value={a}>{a}</option>;})}</select></div><div style={{marginBottom:18}}><label style={LBL}>Tipo</label><select style={INP} value={moverTipo} onChange={function(e){setMoverTipo(e.target.value);}}><option value="foraneos">Foraneo</option><option value="locales">Local</option></select></div><div style={{display:"flex",gap:10}}><button onClick={function(){setMoverM(null);}} style={{flex:1,padding:"11px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#6b7280",fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Cancelar</button><button onClick={function(){moverA(moverM.nom,moverM.tipo);}} style={{flex:2,padding:"11px",background:"rgba(251,191,36,0.15)",border:"2px solid rgba(251,191,36,0.3)",borderRadius:9,color:COL,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Mover</button></div></div></div>)}
      </div>
    );
  }

  // REPORTE DE AREA - despues de cerrar dia
  if(vista==="reporte_area"&&areaActual){
    var entradaHoy=hist.find(function(h){return h.fecha===fecha;})||{areas:{},precio:precio,fecha:fecha};
    var pr=entradaHoy.precio||precio;
    var regsDelArea=entradaHoy.areas[areaActual]||[];
    var extrasDeArea=Object.keys(entradaHoy.areas||{}).filter(function(a){return a!==areaActual;}).reduce(function(acc,a){
      (entradaHoy.areas[a]||[]).filter(function(r){return r.areaOrigen===areaActual;}).forEach(function(r){acc.push(Object.assign({},r,{areaCargo:a}));});
      return acc;
    },[]);
    var todas=regsDelArea.concat(extrasDeArea);
    var totHrs=todas.reduce(function(s,r){return s+r.horas;},0);
    var totCosto=todas.reduce(function(s,r){return s+(r.horas*(r.precio||pr));},0);
    var loc=todas.filter(function(r){return r.tipo==="local";});
    var for2=todas.filter(function(r){return r.tipo==="foraneo";});
    return(
      <div style={{background:"#080f14",minHeight:"100vh"}}>
        <div style={{background:"rgba(0,0,0,0.85)",borderBottom:"2px solid rgba(74,222,128,0.25)",padding:"0 16px",display:"flex",alignItems:"center",height:62,position:"sticky",top:0,zIndex:50}} className="no-print">
          <div style={{fontSize:18,fontWeight:900,color:"#4ade80",flex:1}}>{areaActual}  -  Dia cerrado</div>
          <button onClick={function(){window.print();}} style={{marginRight:8,padding:"9px 20px",background:"linear-gradient(135deg,#14532d,#22c55e)",border:"none",borderRadius:9,color:"#fff",fontSize:15,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Imprimir</button>
          <button onClick={function(){setVista(esMaestro?"menu":"login");}} style={{padding:"9px 16px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#6b7280",fontSize:13,cursor:"pointer",fontFamily:"system-ui"}}>Salir</button>
        </div>
        <div style={{maxWidth:700,margin:"0 auto",padding:"20px 16px 60px"}}>
          {/* Encabezado */}
          <div style={{marginBottom:20,paddingBottom:14,borderBottom:"2px solid rgba(255,255,255,0.08)"}}>
            <div style={{fontSize:22,fontWeight:900,color:"#4ade80"}}>PARRAS VALLEY - HORAS EXTRA</div>
            <div style={{fontSize:15,fontWeight:800,color:"#f0f0e8",marginTop:4}}>{areaActual}</div>
            <div style={{fontSize:13,color:"#9ca3af",marginTop:2}}>Fecha: {fecha} . Precio: {fmt(pr)}/hr . Total: {totHrs} hrs . {fmt(totCosto)}</div>
          </div>

          {[{label:"Foraneos",lista:for2,col:"#60a5fa"},{label:"Locales",lista:loc,col:"#4ade80"}].map(function(g){
            if(!g.lista.length)return null;
            var hG=g.lista.reduce(function(s,r){return s+r.horas;},0);
            var cG=g.lista.reduce(function(s,r){return s+(r.horas*(r.precio||pr));},0);
            return(<div key={g.label} style={{marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,paddingBottom:6,borderBottom:"2px solid "+g.col+"44"}}>
                <div style={{fontSize:14,fontWeight:900,color:g.col,textTransform:"uppercase"}}>{g.label} ({g.lista.length})</div>
                <div style={{fontSize:15,fontWeight:900,color:g.col}}>{hG} hrs . {fmt(cG)}</div>
              </div>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{background:"rgba(0,0,0,0.4)"}}>
                  <th style={{padding:"8px",textAlign:"left",fontSize:11,color:"#4a6a7a",fontWeight:800}}>NOMBRE</th>
                  <th style={{padding:"8px",textAlign:"center",fontSize:11,color:"#4a6a7a",fontWeight:800}}>HORARIO</th>
                  <th style={{padding:"8px",textAlign:"center",fontSize:11,color:"#4a6a7a",fontWeight:800}}>AREA CARGO</th>
                  <th style={{padding:"8px",textAlign:"right",fontSize:11,color:"#4a6a7a",fontWeight:800}}>HRS</th>
                  <th style={{padding:"8px",textAlign:"right",fontSize:11,color:"#4a6a7a",fontWeight:800}}>COSTO</th>
                </tr></thead>
                <tbody>
                  {g.lista.map(function(r){var p=r.precio||pr;return(
                    <tr key={r.id} style={{borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                      <td style={{padding:"9px 8px",fontSize:14,fontWeight:700,color:"#f0f0e8"}}>{r.nombre}</td>
                      <td style={{padding:"9px 8px",textAlign:"center",fontSize:13,color:"#fbbf24"}}>{r.de&&r.a?r.de+" - "+r.a:"-"}</td>
                      <td style={{padding:"9px 8px",textAlign:"center",fontSize:12,color:r.areaExtra?"#fb923c":"#6b7280"}}>{r.areaExtra||areaActual}</td>
                      <td style={{padding:"9px 8px",textAlign:"right",fontSize:16,fontWeight:900,color:g.col,fontFamily:"Georgia,serif"}}>{r.horas}</td>
                      <td style={{padding:"9px 8px",textAlign:"right",fontSize:13,color:"#9ca3af"}}>{fmt(r.horas*p)}</td>
                    </tr>
                  );})}
                </tbody>
              </table>
            </div>);
          })}

          <div style={{background:"rgba(74,222,128,0.1)",border:"2px solid rgba(74,222,128,0.3)",borderRadius:12,padding:"16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:17,fontWeight:900,color:"#4ade80"}}>TOTAL {areaActual.toUpperCase()}</div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:30,fontWeight:900,color:"#4ade80",fontFamily:"Georgia,serif"}}>{totHrs} hrs</div>
              <div style={{fontSize:15,color:"#9ca3af"}}>{fmt(totCosto)}</div>
            </div>
          </div>
        </div>
      </div>
    );
  }
  if(vista==="acumulado"){
    // Construir acumulado por persona y por area desde el historial
    var acumPersona={};
    var acumArea={};
    hist.forEach(function(h){
      var pr=h.precio||precio;
      Object.keys(h.areas||{}).forEach(function(a){
        (h.areas[a]||[]).forEach(function(r){
          // Por persona
          var kp=r.nombre;
          if(!acumPersona[kp])acumPersona[kp]={nombre:r.nombre,tipo:r.tipo,areas:{},totalHrs:0,totalCosto:0,dias:[]};
          acumPersona[kp].totalHrs+=r.horas;
          acumPersona[kp].totalCosto+=r.horas*(r.precio||pr);
          var areaCargo=r.areaExtra||a;
          acumPersona[kp].areas[areaCargo]=(acumPersona[kp].areas[areaCargo]||0)+r.horas;
          if(acumPersona[kp].dias.indexOf(h.fecha)<0)acumPersona[kp].dias.push(h.fecha);
          // Por area de cargo
          var kA=r.areaExtra||a;
          if(!acumArea[kA])acumArea[kA]={area:kA,totalHrs:0,totalCosto:0,personas:{}};
          acumArea[kA].totalHrs+=r.horas;
          acumArea[kA].totalCosto+=r.horas*(r.precio||pr);
          acumArea[kA].personas[r.nombre]=(acumArea[kA].personas[r.nombre]||0)+r.horas;
        });
      });
    });
    var personaArr=Object.keys(acumPersona).map(function(k){return acumPersona[k];}).sort(function(a,b){return b.totalHrs-a.totalHrs;});
    var areaArr=Object.keys(acumArea).map(function(k){return acumArea[k];}).sort(function(a,b){return b.totalHrs-a.totalHrs;});
    var s_acumFiltro=useState("persona"); var acumFiltro=s_acumFiltro[0]; var setAcumFiltro=s_acumFiltro[1];
    var s_acumTipo=useState("todos"); var acumTipo=s_acumTipo[0]; var setAcumTipo=s_acumTipo[1];
    var personaFiltrada=acumTipo==="todos"?personaArr:personaArr.filter(function(p){return p.tipo===acumTipo;});
    return(
      <div style={{background:"#080f14",minHeight:"100vh"}}>
        <div style={{background:"rgba(0,0,0,0.85)",borderBottom:"2px solid rgba(74,222,128,0.25)",padding:"0 16px",display:"flex",alignItems:"center",height:62,position:"sticky",top:0,zIndex:50}}>
          <button onClick={function(){setVista("menu");}} style={{marginRight:14,padding:"8px 14px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#9ca3af",fontSize:14,cursor:"pointer",fontFamily:"system-ui"}}>Volver</button>
          <div style={{fontSize:18,fontWeight:900,color:"#4ade80",flex:1}}>Acumulado</div>
        </div>
        <div style={{maxWidth:900,margin:"0 auto",padding:"18px 14px 80px"}}>
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            <button onClick={function(){setAcumFiltro("persona");}} style={{padding:"8px 18px",border:"2px solid "+(acumFiltro==="persona"?"#4ade80":"rgba(255,255,255,0.1)"),borderRadius:18,background:acumFiltro==="persona"?"rgba(74,222,128,0.15)":"transparent",color:acumFiltro==="persona"?"#4ade80":"#6b7280",fontFamily:"system-ui",fontSize:13,fontWeight:700,cursor:"pointer"}}>Por persona</button>
            <button onClick={function(){setAcumFiltro("area");}} style={{padding:"8px 18px",border:"2px solid "+(acumFiltro==="area"?"#4ade80":"rgba(255,255,255,0.1)"),borderRadius:18,background:acumFiltro==="area"?"rgba(74,222,128,0.15)":"transparent",color:acumFiltro==="area"?"#4ade80":"#6b7280",fontFamily:"system-ui",fontSize:13,fontWeight:700,cursor:"pointer"}}>Por area</button>
            {acumFiltro==="persona"&&["todos","local","foraneo"].map(function(t){return(<button key={t} onClick={function(){setAcumTipo(t);}} style={{padding:"8px 16px",border:"2px solid "+(acumTipo===t?"rgba(74,222,128,0.6)":"rgba(255,255,255,0.1)"),borderRadius:18,background:acumTipo===t?"rgba(74,222,128,0.12)":"transparent",color:acumTipo===t?"#4ade80":"#6b7280",fontFamily:"system-ui",fontSize:13,fontWeight:700,cursor:"pointer",textTransform:"capitalize"}}>{t==="todos"?"Todos":t==="local"?"Locales":"Foraneos"}</button>);})}
          </div>

          {acumFiltro==="persona"&&(
            <div>
              {!personaFiltrada.length?<div style={{textAlign:"center",padding:60,color:"#4a6a7a"}}>Sin datos acumulados</div>:personaFiltrada.map(function(p,i){
                return(<div key={p.nombre} style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(74,222,128,0.2)",borderRadius:12,marginBottom:10,padding:"14px 18px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{fontSize:11,fontWeight:900,color:"#4a6a7a"}}>#{i+1}</div>
                        <div style={{fontSize:16,fontWeight:900,color:"#f0f0e8"}}>{p.nombre}</div>
                        <div style={{fontSize:11,color:p.tipo==="local"?"#4ade80":"#60a5fa"}}>{p.tipo}</div>
                      </div>
                      <div style={{fontSize:12,color:"#6b7280",marginTop:3}}>{p.dias.length} dias trabajados</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:24,fontWeight:900,color:"#4ade80",fontFamily:"Georgia,serif"}}>{p.totalHrs} hrs</div>
                      <div style={{fontSize:13,color:"#9ca3af"}}>{fmt(p.totalCosto)}</div>
                    </div>
                  </div>
                  {Object.keys(p.areas).length>0&&(
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
                      {Object.keys(p.areas).map(function(a){return(<div key={a} style={{padding:"3px 8px",background:colorArea(a)+"22",border:"1px solid "+colorArea(a)+"44",borderRadius:6,fontSize:11,color:colorArea(a),fontWeight:700}}>{a}: {p.areas[a]}hrs</div>);})}
                    </div>
                  )}
                </div>);
              })}
            </div>
          )}

          {acumFiltro==="area"&&(
            <div>
              {!areaArr.length?<div style={{textAlign:"center",padding:60,color:"#4a6a7a"}}>Sin datos acumulados</div>:areaArr.map(function(a,i){
                var personas=Object.keys(a.personas).sort(function(x,y){return a.personas[y]-a.personas[x];});
                return(<div key={a.area} style={{background:"rgba(255,255,255,0.04)",border:"2px solid "+colorArea(a.area)+"44",borderRadius:12,marginBottom:12,overflow:"hidden"}}>
                  <div style={{background:colorArea(a.area)+"18",borderBottom:"2px solid "+colorArea(a.area)+"33",padding:"12px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:32,height:32,borderRadius:"50%",background:colorArea(a.area),display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,color:"#000"}}>{iconoArea(a.area)}</div>
                      <div style={{fontSize:17,fontWeight:900,color:colorArea(a.area)}}>{a.area}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:22,fontWeight:900,color:colorArea(a.area),fontFamily:"Georgia,serif"}}>{a.totalHrs} hrs</div>
                      <div style={{fontSize:13,color:"#9ca3af"}}>{fmt(a.totalCosto)}</div>
                    </div>
                  </div>
                  <div style={{padding:"10px 18px"}}>
                    <div style={{fontSize:11,color:"#6b7280",marginBottom:8}}>{personas.length} personas con extras en esta area</div>
                    {personas.map(function(nom){return(<div key={nom} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}><div style={{fontSize:14,color:"#f0f0e8"}}>{nom}</div><div style={{fontSize:14,fontWeight:700,color:colorArea(a.area),fontFamily:"Georgia,serif"}}>{a.personas[nom]} hrs</div></div>);})}
                  </div>
                </div>);
              })}
            </div>
          )}
        </div>
      </div>
    );
  }

  return <div style={{color:"#fbbf24",padding:40,textAlign:"center",fontSize:18}}>{carg?"Cargando...":"Iniciando..."}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
